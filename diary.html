<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diary | Aurora Deep Night</title>
    <style>
        :root {
            --bg-deep: #050608;
            --aurora-1: rgba(0, 255, 200, 0.15); /* 极光青 */
            --aurora-2: rgba(0, 162, 255, 0.12); /* 极光蓝 */
            --aurora-3: rgba(180, 0, 255, 0.1);  /* 幻影紫 */
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.4);
        }

        /* --- 动态极光背景生成 --- */
        body {
            margin: 0; padding: 0;
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: "Inter", -apple-system, sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            display: flex; flex-direction: column;
        }

        .aurora-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; overflow: hidden; filter: blur(80px); /* 核心模糊：营造流光感 */
        }

        .aurora-blob {
            position: absolute; border-radius: 50%; animation: move 20s infinite alternate;
        }
        .blob1 { width: 400px; height: 400px; background: var(--aurora-1); top: -10%; left: -10%; }
        .blob2 { width: 500px; height: 500px; background: var(--aurora-2); bottom: -10%; right: -5%; animation-duration: 25s; }
        .blob3 { width: 300px; height: 300px; background: var(--aurora-3); top: 40%; left: 20%; animation-duration: 15s; }

        @keyframes move {
            from { transform: translate(0, 0) scale(1); }
            to { transform: translate(100px, 50px) scale(1.2); }
        }

        /* --- 页面布局 --- */
        .hero-spacer {
            height: 35vh; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
        }

        header h1 {
            font-size: 2.2rem; font-weight: 100; letter-spacing: 18px; margin: 0;
            background: linear-gradient(to bottom, #fff, rgba(255,255,255,0.3));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .back-nav {
            margin-top: 30px; text-decoration: none; color: var(--text-dim);
            font-size: 0.6rem; letter-spacing: 3px; padding: 10px 20px;
            border: 1px solid var(--glass-border); border-radius: 30px;
            backdrop-filter: blur(10px); transition: 0.4s;
        }
        .back-nav:hover { color: #fff; border-color: rgba(255,255,255,0.3); background: rgba(255,255,255,0.05); }

        /* --- 高级毛玻璃面板 --- */
        .glass-panel {
            flex-grow: 1; width: 92%; max-width: 650px; margin: 0 auto;
            background: var(--glass-bg);
            backdrop-filter: blur(40px) saturate(120%);
            -webkit-backdrop-filter: blur(40px) saturate(120%);
            border: 1px solid var(--glass-border);
            border-bottom: none; border-radius: 50px 50px 0 0;
            padding: 50px 40px; box-sizing: border-box;
            box-shadow: 0 -20px 40px rgba(0,0,0,0.4);
        }

        .input-group { position: relative; width: 100%; margin-bottom: 30px; }

        textarea {
            width: 100%; background: rgba(255,255,255,0.02); border: 1px solid var(--glass-border);
            border-radius: 20px; padding: 20px; color: #fff; font-size: 0.95rem;
            line-height: 1.8; outline: none; resize: none; min-height: 180px;
            box-sizing: border-box; transition: 0.3s;
        }
        textarea:focus { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.3); }

        .btn-manifest {
            width: 100%; padding: 16px; border-radius: 30px; border: none;
            background: linear-gradient(90deg, rgba(0,255,200,0.1), rgba(0,162,255,0.1));
            color: #fff; font-size: 0.75rem; letter-spacing: 6px; cursor: pointer;
            border: 1px solid var(--glass-border); transition: 0.5s;
        }
        .btn-manifest:hover {
            background: linear-gradient(90deg, rgba(0,255,200,0.2), rgba(0,162,255,0.2));
            transform: translateY(-2px); box-shadow: 0 5px 20px rgba(0,255,200,0.1);
        }

        /* --- 历史记录 --- */
        .history-section { margin-top: 50px; }
        .section-tag { font-size: 0.6rem; letter-spacing: 4px; color: var(--text-dim); text-align: center; margin-bottom: 30px; }
        
        .diary-card {
            background: rgba(255,255,255,0.01); border-bottom: 1px solid var(--glass-border);
            padding: 25px 10px; margin-bottom: 10px; animation: slideUp 0.6s ease forwards;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .diary-date { font-size: 0.55rem; color: var(--aurora-1); letter-spacing: 1px; margin-bottom: 10px; display: block; opacity: 0.8; }
        .diary-content { font-size: 0.9rem; font-weight: 300; opacity: 0.8; line-height: 1.6; }
    </style>
</head>
<body>

    <div class="aurora-canvas">
        <div class="aurora-blob blob1"></div>
        <div class="aurora-blob blob2"></div>
        <div class="aurora-blob blob3"></div>
    </div>

    <div class="hero-spacer">
        <header>
            <h1>DIARY</h1>
            <a href="index.html" class="back-nav">BACK TO STATION</a>
        </header>
    </div>

    <main class="glass-panel">
        <div class="input-group">
            <textarea id="diaryInput" placeholder="在此刻，捕捉潜意识的微光..."></textarea>
        </div>
        <button class="btn-manifest" onclick="saveEntry()">密封并传送</button>

        <div class="history-section">
            <div class="section-tag">VIBRATION LOG</div>
            <div id="historyContainer"></div>
        </div>
    </main>

    <script>
        function saveEntry() {
            const content = document.getElementById('diaryInput').value;
            if(!content) return;

            const now = new Date();
            const dateStr = now.toLocaleDateString() + ' ' + now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            
            const entry = { date: dateStr, text: content };
            let history = JSON.parse(localStorage.getItem('aurora_diary') || '[]');
            history.unshift(entry);
            localStorage.setItem('aurora_diary', JSON.stringify(history));

            document.getElementById('diaryInput').value = '';
            renderHistory();
        }

        function renderHistory() {
            const history = JSON.parse(localStorage.getItem('aurora_diary') || '[]');
            const container = document.getElementById('historyContainer');
            container.innerHTML = history.map(item => `
                <div class="diary-card">
                    <span class="diary-date">${item.date}</span>
                    <div class="diary-content">${item.text}</div>
                </div>
            `).join('');
        }

        window.onload = renderHistory;
    </script>
</body>
</html>
