<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmic Express | 宇宙物流</title>
    <style>
        :root {
            --neon-blue: #00d2ff;
            --glass-white: rgba(255, 255, 255, 0.05);
            --border: rgba(0, 210, 255, 0.2);
        }

        body {
            margin: 0; padding: 20px; background: #020205; color: #fff;
            font-family: -apple-system, sans-serif; min-height: 100vh;
        }

        .container { max-width: 500px; margin: 0 auto; }

        /* --- 模拟快递单 UI --- */
        .shipping-card {
            background: var(--glass-white); backdrop-filter: blur(20px);
            border: 1px solid var(--border); border-radius: 30px;
            padding: 25px; margin-bottom: 30px; position: relative;
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.1);
        }

        .card-header { font-size: 0.6rem; letter-spacing: 3px; color: var(--neon-blue); margin-bottom: 20px; text-align: center; border-bottom: 1px dashed var(--border); padding-bottom: 10px; }

        .form-row { margin-bottom: 15px; }
        .form-row label { display: block; font-size: 0.65rem; opacity: 0.5; margin-bottom: 5px; }
        input, textarea {
            width: 100%; background: rgba(0,0,0,0.3); border: 1px solid var(--border);
            border-radius: 12px; padding: 12px; color: #fff; outline: none; font-size: 0.9rem;
        }

        .btn-order {
            width: 100%; padding: 15px; border-radius: 30px; border: none;
            background: linear-gradient(90deg, #00d2ff, #3a7bd5);
            color: #fff; font-weight: bold; letter-spacing: 5px; cursor: pointer;
            margin-top: 20px; transition: 0.3s;
        }
        .btn-order:hover { transform: scale(1.02); box-shadow: 0 0 20px var(--neon-blue); }

        /* --- 物流时间轴 UI --- */
        .logistics-timeline { display: none; margin-top: 30px; }
        .logistics-node {
            border-left: 2px solid var(--border); margin-left: 10px;
            padding-left: 25px; padding-bottom: 30px; position: relative;
        }
        .logistics-node::before {
            content: ''; position: absolute; left: -7px; top: 0;
            width: 12px; height: 12px; background: var(--border); border-radius: 50%;
        }
        .node-active::before { background: var(--neon-blue); box-shadow: 0 0 10px var(--neon-blue); }
        .node-active { border-left-color: var(--neon-blue); }

        .node-time { font-size: 0.6rem; opacity: 0.4; }
        .node-title { font-size: 0.85rem; font-weight: bold; margin: 5px 0; color: var(--neon-blue); }
        .node-desc { font-size: 0.75rem; opacity: 0.7; line-height: 1.5; }

        /* --- 弹窗 --- */
        #successModal {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.95); padding: 40px; border: 1px solid #fff; border-radius: 20px;
            text-align: center; z-index: 100; box-shadow: 0 0 100px rgba(255,255,255,0.2);
            width: 80%;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="shipping-card" id="inputForm">
            <div class="card-header">UNIVERSE EXPRESS WAYBILL</div>
            <div class="form-row">
                <label>下单日期 (Order Date)</label>
                <input type="date" id="orderDate">
            </div>
            <div class="form-row">
                <label>收货愿望 (Target / Amount)</label>
                <input type="text" id="target" placeholder="例如：轻松获得 100,000 元">
            </div>
            <div class="form-row">
                <label>预定到货日期 (Expected Delivery)</label>
                <input type="date" id="deliveryDate">
            </div>
            <div class="form-row">
                <label>收货场景描述 (Scene Description)</label>
                <textarea id="scene" rows="3" placeholder="描述你拿到它时，那一刻的阳光、空气、你的狂喜..."></textarea>
            </div>
            <button class="btn-order" onclick="processOrder()">立即下单 (CONFIRM)</button>
        </div>

        <div id="trackingArea" class="logistics-timeline">
            <h3 style="font-weight: 100; letter-spacing: 5px; text-align: center; margin-bottom: 30px;">TRACKING INFO</h3>
            <div id="nodes"></div>
        </div>
    </div>

    <div id="successModal">
        <h2 style="letter-spacing: 5px;">下单成功</h2>
        <p style="opacity: 0.7; line-height: 1.8;">订单已录入宇宙核心频率。<br>物流配送期间，请保持“已拥有”的喜悦感。</p>
        <button class="btn-order" style="padding: 10px;" onclick="closeModal()">好的</button>
    </div>

    <script>
        function processOrder() {
            const data = {
                orderDate: document.getElementById('orderDate').value,
                target: document.getElementById('target').value,
                deliveryDate: document.getElementById('deliveryDate').value,
                scene: document.getElementById('scene').value
            };

            if(!data.target || !data.deliveryDate) return alert("物流信息不全，宇宙无法定位。");

            // 显示成功弹窗
            document.getElementById('successModal').style.display = 'block';
            
            // 生成物流节点
            generateLogistics(data);
        }

        function generateLogistics(data) {
            const container = document.getElementById('nodes');
            container.innerHTML = "";
            document.getElementById('inputForm').style.display = 'none';
            document.getElementById('trackingArea').style.display = 'block';

            const stages = [
                { title: "订单已揽收", desc: "宇宙仓库已感应到你的意图，振动对齐中。" },
                { title: "正在离开中心分拣场", desc: "旧有的阻碍正在被移开，物理世界开始重组。" },
                { title: "跨维度运输中", desc: "距离${data.target}又近了一步，感受你拥有后的狂喜！" },
                { title: "到达目的地分拨中心", desc: "桥梁事件已大量生成，请注意生活中的小惊喜。" },
                { title: "派送中", desc: "快递员（灵感/契机）已带货上门，请保持开放的心态。" },
                { title: "签收成功", desc: "显化圆满！感恩宇宙。场景实现：${data.scene}" }
            ];

            stages.forEach((stage, index) => {
                const node = document.createElement('div');
                node.className = `logistics-node ${index === 0 ? 'node-active' : ''}`;
                node.innerHTML = `
                    <div class="node-time">LOGISTICS STEP ${index + 1}</div>
                    <div class="node-title">${stage.title}</div>
                    <div class="node-desc">${stage.desc.replace('${data.target}', data.target).replace('${data.scene}', data.scene)}</div>
                `;
                container.appendChild(node);
            });
        }

        function closeModal() {
            document.getElementById('successModal').style.display = 'none';
        }
    </script>
</body>
</html>
