<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurora Subliminal | 宇宙显化站</title>
    <style>
        :root {
            --body-bg: linear-gradient(180deg, #0a0b14 0%, #050508 100%);
            --panel-bg: rgba(15, 16, 25, 0.65); 
            --card-bg: rgba(255, 255, 255, 0.04);
            --text-color: #ffffff;
            --glass-border: rgba(255, 255, 255, 0.12); 
        }

        .light-mode {
            --body-bg: linear-gradient(180deg, #f0f2f8 0%, #e0e4f0 100%);
            --panel-bg: rgba(255, 255, 255, 0.5); 
            --card-bg: rgba(0, 0, 0, 0.03);
            --text-color: #1a1b25;
            --glass-border: rgba(0, 0, 0, 0.08);
        }

        html, body {
            height: 100%; margin: 0; padding: 0;
            background: var(--body-bg);
            color: var(--text-color);
            font-family: -apple-system, "SF Pro Display", sans-serif;
            transition: all 0.5s ease;
            overflow-x: hidden;
        }

        /* 顶部图片容器：缩小并居中 */
        .image-container {
            height: 40vh; /* 缩小图片占比 */
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .floating-img {
            width: 85%;
            max-width: 340px;
            aspect-ratio: 3/4; /* 或者 1/1 根据你找的图调整 */
            object-fit: cover;
            border-radius: 40px; /* 大圆角 */
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border: 1px solid var(--glass-border);
        }

        /* 玻璃面板：占据大部分空间 */
        .glass-panel {
            min-height: 65vh; /* 向上延伸 */
            background: var(--panel-bg);
            backdrop-filter: blur(50px) saturate(150%);
            -webkit-backdrop-filter: blur(50px) saturate(150%);
            
            border-radius: 50px 50px 0 0;
            border: 1px solid var(--glass-border);
            border-bottom: none;
            
            box-shadow: 0 -15px 40px rgba(0,0,0,0.2);
            padding: 40px 25px 120px 25px;
            width: 100%; box-sizing: border-box;
            max-width: 800px; margin: 0 auto;
            
            display: flex; flex-direction: column; align-items: center;
        }

        header { text-align: center; margin-bottom: 30px; }
        header h1 { 
            font-size: 1.5rem; font-weight: 200; letter-spacing: 12px; 
            margin: 0; opacity: 0.9;
        }

        .search-container { width: 100%; max-width: 400px; margin-bottom: 35px; }
        #searchInput {
            width: 100%; padding: 14px; border-radius: 30px;
            border: 1px solid var(--glass-border);
            background: rgba(255,255,255,0.05);
            color: var(--text-color);
            text-align: center; outline: none;
            backdrop-filter: blur(10px);
        }

        #audio-list { width: 100%; max-width: 600px; display: grid; gap: 15px; }
        .audio-card {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px; padding: 22px;
            transition: 0.3s;
        }
        .audio-card:hover { transform: translateY(-3px); background: rgba(255,255,255,0.08); }

        .audio-info h3 { margin: 0; font-weight: 300; font-size: 1.1rem; }
        .audio-info p { font-size: 0.75rem; opacity: 0.4; margin: 8px 0 15px 0; }

        audio { width: 100%; filter: invert(1) opacity(0.4); height: 32px; }

        .theme-toggle {
            position: fixed; top: 20px; right: 20px; z-index: 100;
            background: rgba(255,255,255,0.1); border: 1px solid var(--glass-border);
            padding: 8px 15px; border-radius: 20px; cursor: pointer; color: var(--text-color);
            font-size: 0.6rem; letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <button class="theme-toggle" onclick="toggleTheme()">🌓 MODE</button>

    <div class="image-container">
        <img src="https://i.pinimg.com/736x/ad/b6/7f/adb67fb86f8d24c19ae43945ef4aca1b.jpg" class="floating-img" alt="Focus">
    </div>

    <main class="glass-panel">
        <header>
            <h1>AURORA</h1>
            <p style="letter-spacing: 4px; opacity: 0.3; font-size: 0.6rem; margin-top: 8px;">INNER RESONANCE</p>
        </header>

        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Search intent..." oninput="render()">
        </div>
        <div id="audio-list"></div>
    </main>

    <script>
        const audioData = [
            { title: "Quantum Abundance", desc: "Align with the flow of infinite energy.", url: "#" },
            { title: "Deep Stillness", desc: "Master the art of being.", url: "#" }
        ];

        function toggleTheme() { document.body.classList.toggle('light-mode'); }

        function render() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const list = document.getElementById('audio-list');
            list.innerHTML = '';
            audioData.forEach(item => {
                if (item.title.toLowerCase().includes(term)) {
                    const card = document.createElement('div');
                    card.className = 'audio-card';
                    card.innerHTML = `
                        <div class="audio-info">
                            <h3>${item.title}</h3>
                            <p>${item.desc}</p>
                        </div>
                        <audio controls src="${item.url}"></audio>
                    `;
                    list.appendChild(card);
                }
            });
        }
        render();
    </script>
</body>
</html>
