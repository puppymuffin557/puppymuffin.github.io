<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurora Subliminal | 宇宙显化站</title>
    <style>
        :root {
            /* 深色模式：粉紫星云专用色 */
            --panel-bg: rgba(15, 10, 25, 0.42); /* 略微带一点深紫色底色 */
            --card-bg: rgba(255, 255, 255, 0.05);
            --text-color: #ffffff;
            --glass-border: rgba(255, 255, 255, 0.2); 
        }

        .light-mode {
            /* 浅色模式：如樱花雾般的质感 */
            --panel-bg: rgba(255, 245, 255, 0.4); 
            --card-bg: rgba(255, 255, 255, 0.3);
            --text-color: #2a1a3a;
            --glass-border: rgba(255, 255, 255, 0.5);
        }

        html {
            height: 100%;
            /* 换上你最新的粉紫星云背景 */
            background: #000 url('https://i.pinimg.com/1200x/dc/27/e9/dc27e9993cbafa7add124d4832f0fa1f.jpg') no-repeat center center fixed;
            background-size: cover;
        }

        body {
            margin: 0; padding: 0;
            min-height: 100vh;
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
            background: transparent;
            display: flex; flex-direction: column;
            transition: color 0.4s ease;
        }

        .hero-spacer {
            height: 50vh; /* 确保露出星云中心最美的粉紫色部分 */
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
        }

        header h1 {
            font-size: clamp(2.2rem, 11vw, 3rem);
            font-weight: 100; letter-spacing: 18px; margin: 0;
            /* 粉白色发光阴影，呼应背景 */
            text-shadow: 0 0 35px rgba(255, 180, 255, 0.4);
            opacity: 0.95;
        }

        .glass-panel {
            flex-grow: 1;
            background: var(--panel-bg);
            /* 极高饱和度补偿，让透出来的紫色更好看 */
            backdrop-filter: blur(50px) saturate(160%);
            -webkit-backdrop-filter: blur(50px) saturate(160%);
            
            border-radius: 50px 50px 0 0;
            border: 1px solid var(--glass-border);
            border-bottom: none;
            
            box-shadow: 0 -15px 50px rgba(40, 0, 60, 0.3);
            
            padding: 55px 25px 120px 25px;
            width: 95%; max-width: 820px;
            margin: 0 auto;
            display: flex; flex-direction: column; align-items: center;
        }

        .search-container {
            width: 100%; max-width: 400px; margin-bottom: 40px;
        }

        #searchInput {
            width: 100%; padding: 16px 25px; border-radius: 35px;
            border: 1px solid var(--glass-border);
            background: rgba(255, 255, 255, 0.08);
            color: var(--text-color);
            text-align: center; outline: none;
            backdrop-filter: blur(10px);
            font-size: 1rem;
            letter-spacing: 1px;
        }

        #audio-list { width: 100%; max-width: 600px; display: grid; gap: 18px; }

        .audio-card {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-radius: 25px; padding: 28px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .audio-card:hover { 
            background: rgba(255, 255, 255, 0.1);
            transform: scale(1.02);
            border-color: rgba(255, 180, 255, 0.4);
        }

        .audio-info h3 { margin: 0; font-weight: 300; font-size: 1.3rem; letter-spacing: 1px; }
        .audio-info p { font-size: 0.85rem; opacity: 0.5; margin: 10px 0 20px 0; line-height: 1.6; }

        audio { width: 100%; filter: invert(1) opacity(0.3) hue-rotate(280deg); height: 35px; }

        .theme-toggle {
            position: fixed; top: 25px; right: 25px; z-index: 100;
            background: rgba(255, 255, 255, 0.08); border: 1px solid var(--glass-border);
            padding: 10px 18px; border-radius: 25px; cursor: pointer;
            color: var(--text-color); backdrop-filter: blur(15px);
            font-size: 0.7rem; letter-spacing: 2px;
        }

        .download-btn {
            color: var(--text-color); opacity: 0.4; text-decoration: none; font-size: 0.65rem;
            border: 1px solid var(--glass-border); padding: 6px 14px; border-radius: 15px;
            margin-top: 15px; display: inline-block; transition: 0.3s;
        }
        .download-btn:hover { opacity: 1; border-color: #ffb4ff; }
    </style>
</head>
<body>

    <button class="theme-toggle" onclick="toggleTheme()">ENERGY MODE</button>

    <div class="hero-spacer">
        <header>
            <h1>AURORA</h1>
            <p style="letter-spacing: 10px; opacity: 0.4; font-size: 0.65rem; margin-top: 15px;">STARDUST RESONANCE</p>
        </header>
    </div>

    <main class="glass-panel">
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="探寻星尘的共鸣..." oninput="render()">
        </div>
        <div id="audio-list"></div>
    </main>

    <script>
        const audioData = [
            { title: "Love & Harmony", desc: "Attract unconditional love and harmonize your inner vibration.", url: "#" },
            { title: "Cosmic Abundance", desc: "Tap into the infinite supply of the universe.", url: "#" }
        ];

        function toggleTheme() {
            document.body.classList.toggle('light-mode');
        }

        function render() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const list = document.getElementById('audio-list');
            list.innerHTML = '';
            audioData.forEach(item => {
                if (item.title.toLowerCase().includes(term)) {
                    const card = document.createElement('div');
                    card.className = 'audio-card';
                    card.innerHTML = `
                        <div class="audio-info">
                            <h3>${item.title}</h3>
                            <p>${item.desc}</p>
                        </div>
                        <audio controls src="${item.url}"></audio>
                        <a href="${item.url}" download class="download-btn">DOWNLOAD</a>
                    `;
                    list.appendChild(card);
                }
            });
        }
        render();
    </script>
</body>
</html>
