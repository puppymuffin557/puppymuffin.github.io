<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Extraterrestrial | Subliminal Station</title>
    <style>
        :root {
            --panel-bg: rgba(10, 10, 15, 0.72);
            --card-bg: rgba(255, 255, 255, 0.05);
            --text-color: #ffffff;
            --glass-border: rgba(255, 255, 255, 0.15);
            --audio-filter: invert(1);
            --avatar-box-bg: #ffffff;
        }

        .light-mode {
            --panel-bg: rgba(250, 250, 252, 0.55);
            --card-bg: rgba(0, 0, 0, 0.03);
            --text-color: #1a1a1c;
            --glass-border: rgba(0, 0, 0, 0.08);
            --audio-filter: invert(0);
        }

        html {
            height: 100%;
            background: #000 url('https://i.pinimg.com/736x/30/3f/f8/303ff83827b904fc55a5f313e1676734.jpg') no-repeat center center fixed;
            background-size: cover;
        }

        body {
            margin: 0; padding: 0; min-height: 100vh;
            color: var(--text-color);
            font-family: "Inter", -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", sans-serif;
            background: transparent;
            display: flex; flex-direction: column;
            transition: all 0.4s ease;
        }

        .hero-spacer {
            height: 65vh; 
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            text-align: center;
            padding: 0 20px;
        }

        /* 核心改动：大标题聚拢排版 */
        header {
            margin-bottom: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header h1 {
            font-size: clamp(3.5rem, 15vw, 5.5rem); /* 极大字号 */
            font-weight: 900;
            letter-spacing: -4px; /* 负间距，向中心聚拢 */
            line-height: 0.85;    /* 极窄行高，让上下行挤压 */
            margin: 0;
            text-shadow: 0 10px 40px rgba(0,0,0,0.6);
            text-transform: uppercase;
            display: flex;
            flex-direction: column;
        }

        header h1 span {
            display: block;
        }

        .sub-title {
            font-size: 0.7rem;
            font-weight: 400;
            letter-spacing: 3px;
            opacity: 0.3; /* 低透明度 */
            margin-top: 25px;
            text-transform: uppercase;
        }

        /* 横向名片卡保持平衡 */
        .profile-card {
            width: 320px;
            height: 130px;
            background: var(--avatar-box-bg);
            border-radius: 30px; 
            display: flex; flex-direction: row; 
            align-items: center; justify-content: flex-start;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            padding: 0 30px; box-sizing: border-box;
            gap: 22px;
        }

        .avatar-circle {
            width: 68px; height: 68px;
            border-radius: 50%;
            overflow: hidden;
            border: 1px solid rgba(0,0,0,0.05);
            flex-shrink: 0;
        }
        .avatar-circle img { width: 100%; height: 100%; object-fit: cover; }

        .card-info { color: #1a1a1c; text-align: left; }
        .card-info .name { font-size: 1.05rem; font-weight: 700; margin: 0; letter-spacing: 1px; }
        .card-info .role { font-size: 0.55rem; font-weight: 400; opacity: 0.6; margin: 2px 0 6px 0; text-transform: uppercase; }
        .card-info .social { font-size: 0.5rem; font-weight: 300; opacity: 0.45; line-height: 1.5; }

        .glass-panel {
            flex-grow: 1;
            background: var(--panel-bg);
            backdrop-filter: blur(45px) saturate(140%);
            -webkit-backdrop-filter: blur(45px) saturate(140%);
            border-radius: 50px 50px 0 0; 
            border: 1px solid var(--glass-border);
            border-bottom: none;
            box-shadow: 0 -20px 60px rgba(0,0,0,0.6);
            padding: 60px 20px 100px 20px;
            width: 100%; max-width: 850px;
            margin: 0 auto;
            display: flex; flex-direction: column; align-items: center;
        }

        .search-container { width: 100%; max-width: 420px; margin-bottom: 45px; }
        #searchInput {
            width: 100%; padding: 18px 25px; border-radius: 35px;
            border: 1px solid var(--glass-border);
            background: rgba(255,255,255,0.06);
            color: var(--text-color);
            text-align: center; outline: none;
            backdrop-filter: blur(10px);
        }

        #audio-list { width: 100%; max-width: 620px; display: grid; gap: 20px; }
        .audio-card {
            background: var(--card-bg); border: 1px solid var(--glass-border);
            border-radius: 25px; padding: 28px; transition: 0.3s ease;
        }
        .audio-card:hover { transform: translateY(-4px); background: rgba(255,255,255,0.1); }
        .audio-info h3 { margin: 0; font-weight: 600; font-size: 1.2rem; }
        .audio-info p { font-size: 0.8rem; opacity: 0.4; margin: 8px 0 20px 0; }
        audio { width: 100%; filter: var(--audio-filter) opacity(0.4); height: 35px; }

        .theme-toggle {
            position: fixed; top: 20px; right: 20px; z-index: 100;
            background: rgba(255,255,255,0.08); border: 1px solid var(--glass-border);
            padding: 10px 20px; border-radius: 25px; cursor: pointer; color: var(--text-color);
            font-size: 0.7rem; backdrop-filter: blur(10px);
        }
    </style>
</head>
<body>

    <button class="theme-toggle" onclick="document.body.classList.toggle('light-mode')">🌓 ENERGY MODE</button>

    <div class="hero-spacer">
        <header>
            <h1>
                <span>THE EXTRA</span>
                <span>TERRESTRIAL</span>
            </h1>
            <div class="sub-title">局外夏的Subliminal站台</div>
        </header>
        
        <div style="display: flex; justify-content: center;">
            <div class="profile-card">
                <div class="avatar-circle">
                    <img src="https://i.pinimg.com/736x/f3/9b/01/f39b01a0cb38ea86d3bbad0e419fbdae.jpg" alt="局外夏">
                </div>
                <div class="card-info">
                    <p class="name">「局外夏」</p>
                    <p class="role">submaker</p>
                    <p class="social">bilibili 局外夏<br>YouTube@bulbby-j2m</p>
                </div>
            </div>
        </div>
    </div>

    <main class="glass-panel">
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="探寻深层频率..." oninput="render()">
        </div>
        <div id="audio-list"></div>
    </main>

    <script>
        const audioData = [
            { title: "[ Wealth ] 888Hz Resonance", desc: "Attract abundance and clear financial blockages.", url: "#" },
            { title: "[ Healing ] Aurora Mist", desc: "Subconscious repair and aura cleansing.", url: "#" }
        ];

        function render() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const list = document.getElementById('audio-list');
            list.innerHTML = '';
            audioData.forEach(item => {
                if (item.title.toLowerCase().includes(term)) {
                    const card = document.createElement('div');
                    card.className = 'audio-card';
                    card.innerHTML = `
                        <div class="audio-info"><h3>${item.title}</h3><p>${item.desc}</p></div>
                        <audio controls src="${item.url}"></audio>
                    `;
                    list.appendChild(card);
                }
            });
        }
        render();
    </script>
</body>
</html>
