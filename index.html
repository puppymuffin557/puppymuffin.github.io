<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurora Subliminal | 显化站台</title>
    <style>
        /* 极光背景动画 */
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(125deg, #020111, #050a30, #191970, #000000);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 亮白发光标题 */
        h1 {
            margin-top: 50px;
            font-size: 2.5rem;
            text-shadow: 0 0 10px rgba(255,255,255,0.8), 0 0 20px rgba(255,255,255,0.5);
            letter-spacing: 5px;
            font-weight: 200;
        }

        /* 搜索框 */
        .search-container {
            margin: 30px 0;
            width: 80%;
            max-width: 600px;
        }

        input[type="text"] {
            width: 100%;
            padding: 15px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.3);
            background: rgba(255,255,255,0.1);
            color: white;
            outline: none;
            backdrop-filter: blur(5px);
            box-shadow: 0 0 15px rgba(255,255,255,0.1);
            transition: 0.3s;
        }

        input[type="text"]:focus {
            box-shadow: 0 0 20px rgba(255,255,255,0.4);
            background: rgba(255,255,255,0.2);
        }

        /* 音频卡片模拟 */
        .audio-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
            width: 80%;
            max-width: 600px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
            transition: transform 0.3s;
        }

        .audio-card:hover {
            transform: translateY(-5px);
            border-color: rgba(255, 255, 255, 0.5);
        }

        .audio-info h3 { margin: 0 0 10px 0; color: #fff; font-weight: 400; }
        
        .controls { display: flex; gap: 15px; align-items: center; margin-top: 15px; }

        button {
            background: rgba(255,255,255,0.9);
            color: #050a30;
            border: none;
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover {
            background: #fff;
            box-shadow: 0 0 15px #fff;
        }

        a.download {
            color: rgba(255,255,255,0.6);
            text-decoration: none;
            font-size: 0.9rem;
        }
        
        a.download:hover { color: #fff; }

    </style>
</head>
<body>

    <h1>AURORA SUBLIMINAL</h1>
    <p style="opacity: 0.7; letter-spacing: 2px;">在这里，听见宇宙的回响</p>

    <div class="search-container">
        <input type="text" placeholder="搜索你的显化频率...">
    </div>

    <div class="audio-card">
        <div class="audio-info">
            <h3>[ 财富显化 ] 纯金频率 - 24小时丰盛意识</h3>
            <p style="font-size: 0.8rem; opacity: 0.6;">包含：888Hz 财富频率 + 潜意识肯定句</p>
        </div>
        <div class="controls">
            <button>在线播放</button>
            <a href="#" class="download">💾 点击下载离线包</a>
        </div>
    </div>

    <div class="audio-card">
        <div class="audio-info">
            <h3>[ 深度疗愈 ] 极光之沐 - 修复身心磁场</h3>
            <p style="font-size: 0.8rem; opacity: 0.6;">适合：睡前聆听，清理负面限制信念</p>
        </div>
        <div class="controls">
            <button>在线播放</button>
            <a href="#" class="download">💾 点击下载离线包</a>
        </div>
    </div>

</body>
</html>
