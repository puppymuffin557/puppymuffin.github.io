<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurora Subliminal | 宇宙显化站</title>
    <style>
        :root {
            /* 深色模式：针对冷色星空优化 */
            --panel-bg: rgba(8, 10, 20, 0.48); 
            --card-bg: rgba(255, 255, 255, 0.04);
            --text-color: #ffffff;
            --glass-border: rgba(255, 255, 255, 0.22); 
            --input-bg: rgba(255, 255, 255, 0.07);
        }

        .light-mode {
            /* 浅色模式：冰川般的纯净感 */
            --panel-bg: rgba(250, 251, 255, 0.42); 
            --card-bg: rgba(255, 255, 255, 0.3);
            --text-color: #1a1a20;
            --glass-border: rgba(0, 0, 0, 0.1);
            --input-bg: rgba(255, 255, 255, 0.5);
        }

        html {
            height: 100%;
            /* 换上你刚选的 2c87e3 极地星空背景 */
            background: #000 url('https://i.pinimg.com/736x/d1/b0/98/d1b098f9542d113a8db61cf1e6c5e83c.jpg') no-repeat center center fixed;
            background-size: cover;
        }

        body {
            margin: 0; padding: 0;
            min-height: 100vh;
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
            background: transparent;
            display: flex; flex-direction: column;
            transition: color 0.4s ease;
        }

        .hero-spacer {
            height: 45vh; 
            display: flex; justify-content: center; align-items: center;
        }

        header h1 {
            font-size: clamp(2.2rem, 10vw, 2.6rem);
            font-weight: 100; letter-spacing: 20px; margin: 0;
            text-shadow: 0 0 30px rgba(255,255,255,0.25);
            text-transform: uppercase;
        }

        /* 3.0 悬浮面板：更细致的边框和更圆润的曲线 */
        .glass-panel {
            flex-grow: 1;
            background: var(--panel-bg);
            backdrop-filter: blur(45px);
            -webkit-backdrop-filter: blur(45px);
            
            border-radius: 60px 60px 0 0; /* 更优雅的大圆角 */
            border: 1px solid var(--glass-border);
            border-bottom: none;
            
            box-shadow: 0 -15px 50px rgba(0,0,0,0.5);
            
            padding: 60px 30px 100px 30px;
            width: 96%; max-width: 800px;
            margin: 0 auto;
            
            display: flex; flex-direction: column; align-items: center;
            transition: all 0.5s ease;
        }

        .search-container {
            width: 100%; max-width: 380px; margin-bottom: 45px;
        }

        #searchInput {
            width: 100%; padding: 12px 20px; border-radius: 30px;
            border: 1px solid var(--glass-border);
            background: var(--input-bg);
            color: var(--text-color);
            text-align: center; outline: none;
            backdrop-filter: blur(10px);
            font-size: 0.9rem; letter-spacing: 1px;
        }

        #audio-list { width: 100%; max-width: 600px; display: grid; gap: 15px; }

        .audio-card {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-radius: 24px; padding: 25px;
            transition: all 0.3s ease;
        }

        .audio-card:hover { 
            background: rgba(255,255,255,0.08);
            transform: translateY(-3px);
            border-color: rgba(255,255,255,0.4);
        }

        .audio-info h3 { margin: 0; font-weight: 300; font-size: 1.1rem; letter-spacing: 1.5px; }
        .audio-info p { font-size: 0.8rem; opacity: 0.4; margin: 8px 0 15px 0; line-height: 1.5; }

        audio { width: 100%; filter: invert(1) opacity(0.35); height: 32px; }

        .theme-toggle {
            position: fixed; top: 25px; right: 25px; z-index: 100;
            background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border);
            padding: 8px 16px; border-radius: 20px; cursor: pointer;
            color: var(--text-color); backdrop-filter: blur(15px);
