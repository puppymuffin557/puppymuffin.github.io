<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurora Subliminal | 宇宙显化站</title>
    <style>
        :root {
            --panel-bg: rgba(10, 10, 15, 0.72);
            --card-bg: rgba(255, 255, 255, 0.05);
            --text-color: #ffffff;
            --glass-border: rgba(255, 255, 255, 0.15);
            --audio-filter: invert(1);
        }

        .light-mode {
            --panel-bg: rgba(250, 250, 252, 0.55);
            --card-bg: rgba(0, 0, 0, 0.03);
            --text-color: #1a1a1c;
            --glass-border: rgba(0, 0, 0, 0.08);
            --audio-filter: invert(0);
        }

        html {
            height: 100%;
            /* 锁定你选定的这张最终背景 */
            background: #000 url('https://i.pinimg.com/736x/30/3f/f8/303ff83827b904fc55a5f313e1676734.jpg') no-repeat center center fixed;
            background-size: cover;
        }

        body {
            margin: 0; padding: 0; min-height: 100vh;
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", sans-serif;
            background: transparent;
            display: flex; flex-direction: column;
            transition: all 0.4s ease;
        }

        .hero-spacer {
            height: 52vh; /* 优化留白比例 */
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
        }

        header h1 {
            font-size: clamp(2rem, 10vw, 2.8rem);
            font-weight: 100; letter-spacing: 15px; margin: 0;
            text-shadow: 0 0 20px rgba(255,255,255,0.2);
            opacity: 0.85;
            text-transform: uppercase;
        }

        .glass-panel {
            flex-grow: 1;
            background: var(--panel-bg);
            backdrop-filter: blur(45px) saturate(140%);
            -webkit-backdrop-filter: blur(45px) saturate(140%);
            
            border-radius: 45px 45px 0 0; 
            border: 1px solid var(--glass-border);
            border-bottom: none;
            
            box-shadow: 0 -20px 50px rgba(0,0,0,0.5);
            
            padding: 45px 20px 100px 20px;
            width: 94%; max-width: 820px;
            margin: 0 auto;
            display: flex; flex-direction: column; align-items: center;
            transition: background 0.5s ease;
        }

        .search-container { width: 100%; max-width: 420px; margin-bottom: 35px; }

        #searchInput {
            width: 100%; padding: 15px 20px; border-radius: 30px;
            border: 1px solid var(--glass-border);
            background: rgba(255,255,255,0.06);
            color: var(--text-color);
            text-align: center; outline: none;
            backdrop-filter: blur(10px);
            font-size: 0.95rem;
            letter-spacing: 1px;
        }

        #audio-list { width: 100%; max-width: 620px; display: grid; gap: 18px; }

        .audio-card {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-radius: 22px; padding: 25px;
            transition: 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .audio-card:hover { 
            background: rgba(255,255,255,0.09);
            transform: translateY(-3px);
            border-color: rgba(255,255,255,0.3);
        }

        .audio-info h3 { margin: 0; font-weight: 300; font-size: 1.15rem; letter-spacing: 0.5px; }
        .audio-info p { font-size: 0.75rem; opacity: 0.4; margin: 8px 0 18px 0; line-height: 1.5; }

        audio { width: 100%; filter: var(--audio-filter) opacity(0.4); height: 32px; }

        .theme-toggle {
            position: fixed; top: 20px; right: 20px; z-index: 100;
            background: rgba(255,255,255,0.08); border: 1px solid var(--glass-border);
            padding: 8px 16px; border-radius: 20px; cursor: pointer;
            color: var(--text-color); backdrop-filter: blur(10px);
            font-size: 0.65rem; letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <button class="theme-toggle" onclick="document.body.classList.toggle('light-mode')">🌓 ENERGY MODE</button>

    <div class="hero-spacer">
        <header>
            <h1>AURORA</h1>
            <p style="letter-spacing: 6px; opacity: 0.3; font-size: 0.6rem; margin-top: 12px;">QUANTUM FLOW</p>
        </header>
    </div>

    <main class="glass-panel">
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="探寻频率..." oninput="render()">
        </div>
        <div id="audio-list"></div>
    </main>

    <script>
        const audioData = [
            { title: "[ Wealth ] 888Hz Resonance", desc: "Attract abundance and clear financial blockages.", url: "#" },
            { title: "[ Healing ] Aurora Mist", desc: "Subconscious repair and aura cleansing.", url: "#" }
        ];

        function render() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const list = document.getElementById('audio-list');
            list.innerHTML = '';
            audioData.forEach(item => {
                if (item.title.toLowerCase().includes(term)) {
                    const card = document.createElement('div');
                    card.className = 'audio-card';
                    card.innerHTML = `
                        <div class="audio-info">
                            <h3>${item.title}</h3>
                            <p>${item.desc}</p>
                        </div>
                        <audio controls src="${item.url}"></audio>
                    `;
                    list.appendChild(card);
                }
            });
        }
        render();
    </script>
</body>
</html>
