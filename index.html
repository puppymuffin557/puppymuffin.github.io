<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L'Étranger Été | Subliminal Station</title>
    <style>
        :root {
            --panel-bg: rgba(10, 10, 15, 0.72);
            --card-bg: rgba(255, 255, 255, 0.05);
            --text-color: #ffffff;
            --glass-border: rgba(255, 255, 255, 0.15);
            --audio-filter: invert(1);
            --avatar-box-bg: #ffffff;
        }

        .light-mode {
            --panel-bg: rgba(250, 250, 252, 0.55);
            --card-bg: rgba(0, 0, 0, 0.03);
            --text-color: #1a1a1c;
            --glass-border: rgba(0, 0, 0, 0.08);
            --audio-filter: invert(0);
        }

        html {
            height: 100%;
            background: #000 url('https://i.pinimg.com/736x/30/3f/f8/303ff83827b904fc55a5f313e1676734.jpg') no-repeat center center fixed;
            background-size: cover;
        }

        body {
            margin: 0; padding: 0; min-height: 100vh;
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", sans-serif;
            background: transparent;
            display: flex; flex-direction: column;
            transition: all 0.4s ease;
        }

        .hero-spacer {
            height: 62vh; /* 稍微增加高度，适配更大的名片卡 */
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            text-align: center;
        }

        header h1 {
            font-size: clamp(1.4rem, 6vw, 2rem);
            font-weight: 800;
            letter-spacing: 4px; 
            margin-bottom: 30px;
            text-shadow: 0 4px 15px rgba(0,0,0,0.5);
            text-transform: uppercase;
        }

        /* 3:1 名片盒设计 */
        .profile-card {
            width: 180px; 
            height: 180px;
            background: var(--avatar-box-bg);
            border-radius: 40px;
            display: flex; flex-direction: column; /* 纵向排列内容 */
            justify-content: center; align-items: center;
            box-shadow: 0 15px 45px rgba(0,0,0,0.4);
            transition: all 0.4s ease;
            padding: 20px;
            box-sizing: border-box;
        }

        .profile-card:hover {
            transform: translateY(-5px);
        }

        /* 顶部头像 */
        .avatar-circle {
            width: 60px; height: 60px;
            border-radius: 50%;
            overflow: hidden;
            margin-bottom: 12px; /* 给下方文字留空 */
            border: 1px solid rgba(0,0,0,0.05);
        }
        .avatar-circle img { width: 100%; height: 100%; object-fit: cover; }

        /* 名片小字排版 */
        .card-info {
            color: #1a1a1c; /* 黑色小字，在白底上清晰 */
            text-align: center;
        }
        .card-info .name {
            font-size: 0.9rem; font-weight: 600; margin: 0; letter-spacing: 2px;
        }
        .card-info .role {
            font-size: 0.6rem; font-weight: 400; opacity: 0.6; 
            margin: 2px 0 6px 0; text-transform: uppercase; letter-spacing: 1px;
        }
        .card-info .social {
            font-size: 0.5rem; font-weight: 300; opacity: 0.5;
            white-space: nowrap; line-height: 1.4;
        }

        .glass-panel {
            flex-grow: 1;
            background: var(--panel-bg);
            backdrop-filter: blur(45px) saturate(140%);
            -webkit-backdrop-filter: blur(45px) saturate(140%);
            border-radius: 45px 45px 0 0; 
            border: 1px solid var(--glass-border);
            border-bottom: none;
            box-shadow: 0 -20px 50px rgba(0,0,0,0.5);
            padding: 50px 20px 100px 20px;
            width: 94%; max-width: 820px;
            margin: 0 auto;
            display: flex; flex-direction: column; align-items: center;
        }

        .search-container { width: 100%; max-width: 420px; margin-bottom: 40px; }
        #searchInput {
            width: 100%; padding: 15px 20px; border-radius: 30px;
            border: 1px solid var(--glass-border);
            background: rgba(255,255,255,0.06);
            color: var(--text-color);
            text-align: center; outline: none;
            backdrop-filter: blur(10px);
        }

        #audio-list { width: 100%; max-width: 620px; display: grid; gap: 18px; }
        .audio-card {
            background: var(--card-bg); border: 1px solid var(--glass-border);
            border-radius: 22px; padding: 25px; transition: 0.3s ease;
        }
        .audio-card:hover { background: rgba(255,255,255,0.09); }
        .audio-info h3 { margin: 0; font-weight: 500; font-size: 1.15rem; }
        .audio-info p { font-size: 0.75rem; opacity: 0.4; margin: 8px 0 18px 0; }
        audio { width: 100%; filter: var(--audio-filter) opacity(0.4); height: 32px; }

        .theme-toggle {
            position: fixed; top: 20px; right: 20px; z-index: 100;
            background: rgba(255,255,255,0.08); border: 1px solid var(--glass-border);
            padding: 8px 16px; border-radius: 20px; cursor: pointer; color: var(--text-color);
            font-size: 0.65rem;
        }
    </style>
</head>
<body>

    <button class="theme-toggle" onclick="document.body.classList.toggle('light-mode')">🌓 MODE</button>

    <div class="hero-spacer">
        <header>
            <h1>L'Étranger Été's Subliminal Station</h1>
            <div style="display: flex; justify-content: center;">
                <div class="profile-card">
                    <div class="avatar-circle">
                        <img src="https://i.pinimg.com/736x/f3/9b/01/f39b01a0cb38ea86d3bbad0e419fbdae.jpg" alt="局外夏">
                    </div>
                    <div class="card-info">
                        <p class="name">「局外夏」</p>
                        <p class="role">submaker</p>
                        <p class="social">bilibili 局外夏<br>YouTube@bulbby-j2m</p>
                    </div>
                </div>
            </div>
        </header>
    </div>

    <main class="glass-panel">
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="探寻深层频率..." oninput="render()">
        </div>
        <div id="audio-list"></div>
    </main>

    <script>
        const audioData = [
            { title: "[ Wealth ] 888Hz Resonance", desc: "Attract abundance and clear financial blockages.", url: "#" },
            { title: "[ Healing ] Aurora Mist", desc: "Subconscious repair and aura cleansing.", url: "#" }
        ];

        function render() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const list = document.getElementById('audio-list');
            list.innerHTML = '';
            audioData.forEach(item => {
                if (item.title.toLowerCase().includes(term)) {
                    const card = document.createElement('div');
                    card.className = 'audio-card';
                    card.innerHTML = `
                        <div class="audio-info"><h3>${item.title}</h3><p>${item.desc}</p></div>
                        <audio controls src="${item.url}"></audio>
                    `;
                    list.appendChild(card);
                }
            });
        }
        render();
    </script>
</body>
</html>
