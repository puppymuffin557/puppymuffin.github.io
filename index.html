<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurora Subliminal | 宇宙显化站</title>
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
            --accent-glow: rgba(183, 132, 247, 0.3);
        }

        body {
            margin: 0; padding: 0;
            background: url('https://i.pinimg.com/736x/30/3f/f8/303ff83827b904fc55a5f313e1676734.jpg') no-repeat center center fixed;
            background-size: cover;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }

        header { width: 100%; padding: 80px 0 30px 0; text-align: center; }
        h1 { font-size: 3rem; font-weight: 200; letter-spacing: 10px; margin: 0; text-shadow: 0 0 20px rgba(255,255,255,0.4); text-transform: uppercase; }
        .subtitle { font-size: 0.8rem; opacity: 0.6; letter-spacing: 4px; margin-top: 15px; }

        .search-container { margin: 20px 0 40px 0; width: 85%; max-width: 500px; }
        #searchInput {
            width: 100%; padding: 18px; border-radius: 50px; border: 1px solid var(--glass-border);
            background: var(--glass-bg); color: white; outline: none; backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        #audio-list { width: 90%; max-width: 700px; display: grid; gap: 25px; padding-bottom: 100px; }

        .audio-card {
            background: var(--glass-bg); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border); border-radius: 30px; padding: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4); transition: 0.4s;
        }
        .audio-card:hover { transform: scale(1.02); border-color: rgba(255,255,255,0.4); }

        .audio-info h3 { margin: 0 0 10px 0; font-weight: 300; font-size: 1.3rem; }
        .audio-info p { font-size: 0.85rem; opacity: 0.5; margin-bottom: 20px; }

        audio { width: 100%; filter: invert(1) opacity(0.6); }

        .download-btn {
            display: inline-block; margin-top: 15px; color: rgba(255,255,255,0.5); text-decoration: none;
            font-size: 0.7rem; border: 1px solid rgba(255,255,255,0.2); padding: 6px 15px; border-radius: 20px;
        }
    </style>
</head>
<body>

    <header>
        <h1>AURORA</h1>
        <div class="subtitle">宇宙频率 · 潜意识显化</div>
    </header>

    <div class="search-container">
        <input type="text" id="searchInput" placeholder="感知显化频率..." oninput="render()">
    </div>

    <div id="audio-list"></div>

    <script>
        // 直接把内容写在这里，确保万无一失
        const audioData = [
            {
                title: "[ 财富显化 ] 纯金频率",
                desc: "888Hz 财富磁场清理，吸引丰盛能量流向你。",
                url: "https://www.w3schools.com/html/horse.mp3"
            },
            {
                title: "[ 深度修复 ] 极光之沐",
                desc: "清理潜意识负面限制，修复身心磁场。",
                url: "https://www.w3schools.com/html/horse.mp3"
            }
        ];

        function render() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const list = document.getElementById('audio-list');
            list.innerHTML = '';
            audioData.forEach(item => {
                if (item.title.toLowerCase().includes(term)) {
                    const card = document.createElement('div');
                    card.className = 'audio-card';
                    card.innerHTML = `
                        <div class="audio-info">
                            <h3>${item.title}</h3>
                            <p>${item.desc}</p>
                        </div>
                        <audio controls src="${item.url}"></audio>
                        <a href="${item.url}" download class="download-btn">DOWNLOAD MP3</a>
                    `;
                    list.appendChild(card);
                }
            });
        }
        render(); // 初始化运行
    </script>
</body>
</html>
