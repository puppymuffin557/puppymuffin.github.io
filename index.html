<!DOCTYPE html>
<html lang="zh-CN">
<head>

        :root {
            /* 深色模式：暗色玻璃 */
            --glass-overlay: rgba(10, 10, 12, 0.7);

            --border-color: rgba(255, 255, 255, 0.1);
            --card-bg: rgba(255, 255, 255, 0.03);
            --invert-val: 1;
        }

        .light-mode {
            /* 浅色模式：亮色玻璃 */
            --glass-overlay: rgba(255, 255, 255, 0.6);
            --text-color: #1d1d1f;
            --border-color: rgba(0, 0, 0, 0.08);
            --card-bg: rgba(0, 0, 0, 0.02);
            --invert-val: 0;
        }

        body, html {

            color: var(--text-color);
            font-family: -apple-system, "SF Pro Display", sans-serif;
            transition: all 0.5s ease;
            background: #000; /* 底色防止闪烁 */
        }

        /* 全屏固定背景图 */
        .fixed-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://i.pinimg.com/736x/30/3f/f8/303ff83827b904fc55a5f313e1676734.jpg') no-repeat center center;
            background-size: cover;
            z-index: -1;
        }

        .hero-spacer {
            height: 70vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

            letter-spacing: 15px;

        }
