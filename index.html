<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurora Subliminal | 宇宙显化站</title>
    <style>
        :root {
            /* 深色模式：折中的晶体感 */
            --panel-bg: rgba(12, 12, 18, 0.45); /* 浓度回升，增加实体感 */
            --card-bg: rgba(255, 255, 255, 0.06);
            --text-color: #ffffff;
            --glass-border: rgba(255, 255, 255, 0.2); 
            --input-bg: rgba(255, 255, 255, 0.08);
        }

        .light-mode {
            /* 浅色模式：柔和的乳白玻璃 */
            --panel-bg: rgba(240, 240, 245, 0.4); 
            --card-bg: rgba(255, 255, 255, 0.25);
            --text-color: #1a1a1c;
            --glass-border: rgba(0, 0, 0, 0.12);
            --input-bg: rgba(255, 255, 255, 0.4);
        }

        html {
            height: 100%;
            background: #000 url('https://i.pinimg.com/736x/30/3f/f8/303ff83827b904fc55a5f313e1676734.jpg') no-repeat center center fixed;
            background-size: cover;
        }

        body {
            margin: 0; padding: 0;
            min-height: 100vh;
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
            background: transparent;
            display: flex; flex-direction: column;
            transition: color 0.4s ease;
        }

        .hero-spacer {
            height: 48vh; 
            display: flex; justify-content: center; align-items: center;
        }

        header h1 {
            font-size: clamp(2rem, 10vw, 2.8rem);
            font-weight: 200; letter-spacing: 14px; margin: 0;
            text-shadow: 0 0 25px rgba(255,255,255,0.3);
            text-transform: uppercase;
        }

        /* 折中版：晶体悬浮面板 */
        .glass-panel {
            flex-grow: 1;
            background: var(--panel-bg);
            backdrop-filter: blur(50px); /* 稍微降低模糊，让背景更“实”一点点 */
            -webkit-backdrop-filter: blur(50px);
            
            border-radius: 45px 45px 0 0;
            border: 1.5px solid var(--glass-border); /* 线条感更明确 */
            border-bottom: none;
            
            box-shadow: 0 -10px 40px rgba(0,0,0,0.3);
            
            padding: 45px 25px 100px 25px;
            width: 95%; max-width: 820px;
            margin: 0 auto;
            
            display: flex; flex-direction: column; align-items: center;
            transition: all 0.5s ease;
        }

        .search-container {
            width: 100%; max-width: 420px; margin-bottom: 35px;
        }

        #searchInput {
            width: 100%; padding: 14px 20px; border-radius: 30px;
            border: 1px solid var(--glass-border);
            background: var(--input-bg);
            color: var(--text-color);
            text-align: center; outline: none;
            backdrop-filter: blur(10px);
        }

        #audio-list { width: 100%; max-width: 620px; display: grid; gap: 15px; }

        .audio-card {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-radius: 22px; padding: 25px;
            transition: background 0.3s;
        }

        .audio-card:hover { background: rgba(255,255,255,0.1); }

        .audio-info h3 { margin: 0; font-weight: 400; font-size: 1.2rem; letter-spacing: 0.5px; }
        .audio-info p { font-size: 0.85rem; opacity: 0.5; margin: 8px 0 15px 0; font-weight: 300; }

        audio { width: 100%; filter: invert(1) opacity(0.5); height: 35px; }

        .theme-toggle {
            position: fixed; top: 20px; right: 20px; z-index: 100;
            background: rgba(255,255,255,0.08); border: 1px solid var(--glass-border);
            padding: 8px 16px; border-radius: 20px; cursor: pointer;
            color: var(--text-color); backdrop-filter: blur(10px);
            font-size: 0.7rem; letter-spacing: 1px;
        }

        .download-btn {
            color: var(--text-color); opacity: 0.4; text-decoration: none; font-size: 0.65rem;
            border: 1px solid var(--glass-border); padding: 5px 12px; border-radius: 12px;
            margin-top: 15px; display: inline-block;
        }
    </style>
</head>
<body>

    <button class="theme-toggle" onclick="toggleTheme()">ENERGY MODE</button>

    <div class="hero-spacer">
        <header>
            <h1>AURORA</h1>
            <p style="letter-spacing: 6px; opacity: 0.5; font-size: 0.6rem; margin-top: 10px;">QUANTUM FLOW STATE</p>
        </header>
    </div>

    <main class="glass-panel">
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Search Frequency..." oninput="render()">
        </div>
        <div id="audio-list"></div>
    </main>

    <script>
        const audioData = [
            { title: "Financial Abundance", desc: "Attract abundance and clear financial blockages.", url: "#" },
            { title: "Spiritual Healing", desc: "Dissolve ego barriers and embrace universal love.", url: "#" }
        ];

        function toggleTheme() {
            document.body.classList.toggle('light-mode');
        }

        function render() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const list = document.getElementById('audio-list');
            list.innerHTML = '';
            audioData.forEach(item => {
                if (item.title.toLowerCase().includes(term)) {
                    const card = document.createElement('div');
                    card.className = 'audio-card';
                    card.innerHTML = `
                        <div class="audio-info">
                            <h3>${item.title}</h3>
                            <p>${item.desc}</p>
                        </div>
                        <audio controls src="${item.url}"></audio>
                        <a href="${item.url}" download class="download-btn">DOWNLOAD</a>
                    `;
                    list.appendChild(card);
                }
            });
        }
        render();
    </script>
</body>
</html>
