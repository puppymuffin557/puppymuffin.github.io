<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Extraterrestrial | Subliminal Station</title>
    <style>
        :root {
            --panel-bg: rgba(10, 10, 15, 0.72);
            --card-bg: rgba(255, 255, 255, 0.05);
            --text-color: #ffffff;
            --glass-border: rgba(255, 255, 255, 0.15);
            --audio-filter: invert(1);
            --avatar-box-bg: #ffffff;
        }

        .light-mode {
            --panel-bg: rgba(250, 250, 252, 0.55);
            --card-bg: rgba(0, 0, 0, 0.03);
            --text-color: #1a1a1c;
            --glass-border: rgba(0, 0, 0, 0.08);
            --audio-filter: invert(0);
        }

        html, body {
            height: 100%; margin: 0; padding: 0;
            background: #000; /* 兜底黑 */
        }

        /* 背景锁定 */
        .bg-fixed {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://i.pinimg.com/736x/30/3f/f8/303ff83827b904fc55a5f313e1676734.jpg') no-repeat center center;
            background-size: cover;
            z-index: -1;
        }

        body {
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", sans-serif;
            display: flex; flex-direction: column;
            transition: all 0.4s ease;
        }

        .hero-spacer {
            min-height: 60vh;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            padding: 40px 20px;
            box-sizing: border-box;
        }

        header {
            width: 100%;
            max-width: 500px;
            display: flex; flex-direction: column; align-items: center;
        }

        /* 修复后的图片样式，增加加载失败时的隐藏处理 */
        .title-image {
            width: 90%; height: auto;
            filter: drop-shadow(0 15px 30px rgba(0,0,0,0.6));
            display: block;
        }

        .sub-title {
            font-size: 0.65rem;
            font-weight: 300;
            letter-spacing: 5px;
            opacity: 0.35;
            margin: 20px 0 35px 0;
            text-transform: uppercase;
            text-align: center;
        }

        /* 横向名片卡 */
        .profile-card {
            width: 300px; height: 120px;
            background: var(--avatar-box-bg);
            border-radius: 28px;
            display: flex; flex-direction: row;
            align-items: center; padding: 0 25px;
            gap: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .avatar-circle {
            width: 60px; height: 60px;
            border-radius: 50%; overflow: hidden; flex-shrink: 0;
        }
        .avatar-circle img { width: 100%; height: 100%; object-fit: cover; }

        .card-info { color: #1a1a1c; text-align: left; }
        .card-info .name { font-size: 1rem; font-weight: 700; margin: 0; }
        .card-info .role { font-size: 0.5rem; opacity: 0.6; margin: 2px 0; text-transform: uppercase; }
        .card-info .social { font-size: 0.5rem; opacity: 0.5; line-height: 1.4; }

        .glass-panel {
            flex-grow: 1;
            background: var(--panel-bg);
            backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
            border-radius: 40px 40px 0 0;
            border: 1px solid var(--glass-border);
            padding: 50px 20px;
            width: 100%; max-width: 800px;
            margin: 0 auto; box-sizing: border-box;
            display: flex; flex-direction: column; align-items: center;
        }

        #searchInput {
            width: 100%; max-width: 400px; padding: 15px; border-radius: 25px;
            border: 1px solid var(--glass-border); background: rgba(255,255,255,0.05);
            color: white; text-align: center; margin-bottom: 40px;
        }

        #audio-list { width: 100%; max-width: 600px; }
        .audio-card {
            background: var(--card-bg); border-radius: 20px; padding: 20px; margin-bottom: 15px;
            border: 1px solid var(--glass-border);
        }
        .audio-info h3 { margin: 0; font-size: 1.1rem; }
        .audio-info p { font-size: 0.75rem; opacity: 0.4; margin: 5px 0 15px 0; }
        audio { width: 100%; filter: var(--audio-filter); opacity: 0.5; }

        .theme-toggle {
            position: fixed; top: 15px; right: 15px; z-index: 100;
            background: rgba(255,255,255,0.1); border: 1px solid var(--glass-border);
            padding: 8px 15px; border-radius: 20px; color: white; font-size: 0.6rem;
        }
    </style>
</head>
<body>
    <div class="bg-fixed"></div>
    <button class="theme-toggle" onclick="document.body.classList.toggle('light-mode')">🌓 MODE</button>

    <div class="hero-spacer">
        <header>
            <img src="https://i.ibb.co/7xWt1rBR/image.png" alt="TITLE" class="title-image" onerror="this.style.display='none'">
            <div class="sub-title">局外夏的Subliminal站台</div>
        </header>
        
        <div class="profile-card">
            <div class="avatar-circle">
                <img src="https://i.pinimg.com/736x/f3/9b/01/f39b01a0cb38ea86d3bbad0e419fbdae.jpg">
            </div>
            <div class="card-info">
                <p class="name">「局外夏」</p>
                <p class="role">submaker</p>
                <p class="social">bilibili 局外夏<br>YouTube@bulbby-j2m</p>
            </div>
        </div>
    </div>

    <main class="glass-panel">
        <input type="text" id="searchInput" placeholder="搜索频率..." oninput="render()">
        <div id="audio-list"></div>
    </main>

    <script>
        const audioData = [
            { title: "[ Wealth ] 888Hz Resonance", desc: "Attract abundance.", url: "#" },
            { title: "[ Healing ] Aurora Mist", desc: "Aura cleansing.", url: "#" }
        ];

        function render() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const list = document.getElementById('audio-list');
            list.innerHTML = '';
            audioData.forEach(item => {
                if (item.title.toLowerCase().includes(term)) {
                    list.innerHTML += `
                        <div class="audio-card">
                            <div class="audio-info"><h3>${item.title}</h3><p>${item.desc}</p></div>
                            <audio controls src="${item.url}"></audio>
                        </div>
                    `;
                }
            });
        }
        render();
    </script>
</body>
</html>
