<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurora Subliminal | 宇宙显化站</title>
    <style>
        :root {
            /* 深色模式：极高透明度的暗色玻璃 */
            --panel-bg: rgba(0, 0, 0, 0.25); /* 显著降低不透明度 */
            --card-bg: rgba(255, 255, 255, 0.03);
            --text-color: #ffffff;
            --glass-border: rgba(255, 255, 255, 0.18); /* 边缘稍微亮一点，勾勒轮廓 */
            --input-bg: rgba(255, 255, 255, 0.05);
        }

        .light-mode {
            /* 浅色模式：像晨雾一样的通透感 */
            --panel-bg: rgba(255, 255, 255, 0.2); 
            --card-bg: rgba(255, 255, 255, 0.1);
            --text-color: #1d1d1f;
            --glass-border: rgba(255, 255, 255, 0.4);
            --input-bg: rgba(255, 255, 255, 0.2);
        }

        html {
            height: 100%;
            background: #000 url('https://i.pinimg.com/736x/30/3f/f8/303ff83827b904fc55a5f313e1676734.jpg') no-repeat center center fixed;
            background-size: cover;
        }

        body {
            margin: 0; padding: 0;
            min-height: 100vh;
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            background: transparent;
            display: flex;
            flex-direction: column;
            transition: color 0.5s ease;
        }

        .hero-spacer {
            height: 50vh; /* 进一步压缩，让背景核心星云露出来 */
            display: flex;
            justify-content: center;
            align-items: center;
            flex-shrink: 0;
        }

        header h1 {
            font-size: clamp(2.2rem, 12vw, 3.2rem);
            font-weight: 100; letter-spacing: 18px; margin: 0;
            text-shadow: 0 0 20px rgba(255,255,255,0.4);
            text-transform: uppercase;
        }

        /* 核心优化：超通透悬浮面板 */
        .glass-panel {
            flex-grow: 1;
            background: var(--panel-bg);
            backdrop-filter: blur(80px); /* 极高的模糊度，像液态玻璃 */
            -webkit-backdrop-filter: blur(80px);
            
            border-radius: 50px 50px 0 0; /* 更圆润的衔接 */
            border: 1px solid var(--glass-border);
            border-bottom: none;
            
            box-shadow: 0 -15px 45px rgba(0,0,0,0.2);
            
            padding: 50px 25px 120px 25px;
            width: 94%; 
            max-width: 800px;
            margin: 0 auto;
            
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .search-container {
            width: 100%; max-width: 400px; margin-bottom: 40px;
        }

        #searchInput {
            width: 100%; padding: 16px 28px; border-radius: 35px;
            border: 1px solid var(--glass-border);
            background: var(--input-bg);
            color: var(--text-color);
            text-align: center; outline: none;
            backdrop-filter: blur(10px);
            transition: 0.3s;
        }

        #searchInput:focus {
            background: rgba(255,255,255,0.12);
            border-color: rgba(255,255,255,0.5);
        }

        #audio-list { width: 100%; max-width: 600px; display: grid; gap: 18px; }

        /* 卡片也要透气 */
        .audio-card {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-radius: 25px; padding: 28px;
            transition: all 0.4s ease;
        }

        .audio-card:hover { 
            background: rgba(255,255,255,0.08);
            transform: scale(1.01);
        }

        .audio-info h3 { margin: 0; font-weight: 300; font-size: 1.25rem; letter-spacing: 1px; }
        .audio-info p { font-size: 0.85rem; opacity: 0.4; margin: 10px 0 20px 0; font-weight: 300; }

        audio { 
            width: 100%; 
            filter: invert(1) opacity(0.4) grayscale(1); /* 极简灰色播放器 */
            height: 32px; 
        }

        .theme-toggle {
            position: fixed; top: 25px; right: 25px; z-index: 100;
            background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border);
            padding: 10px 18px; border-radius: 30px; cursor: pointer;
            color: var(--text-color); backdrop-filter: blur(15px);
            font-size: 0.7rem; letter-spacing: 2px;
            transition: 0.3s;
        }

        .theme-toggle:hover { background: rgba(255,255,255,0.15); }

        .download-btn {
            color: var(--text-color); opacity: 0.3; text-decoration: none; font-size: 0.6rem;
            border: 1px solid var(--glass-border); padding: 6px 14px; border-radius: 15px;
            margin-top: 15px; display: inline-block; letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <button class="theme-toggle" onclick="toggleTheme()">ENERGY MODE</button>

    <div class="hero-spacer">
        <header>
            <h1>AURORA</h1>
            <p style="letter-spacing: 8px; opacity: 0.4; font-size: 0.65rem; margin-top: 12px;">QUANTUM FLOW STATE</p>
        </header>
    </div>

    <main class="glass-panel">
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Pure Intentions Only..." oninput="render()">
        </div>
        <div id="audio-list"></div>
    </main>

    <script>
        const audioData = [
            { title: "Financial Abundance", desc: "Align your internal vibration with the frequency of gold.", url: "#" },
            { title: "Spiritual Healing", desc: "Dissolve ego barriers and embrace universal love.", url: "#" }
        ];

        function toggleTheme() {
            document.body.classList.toggle('light-mode');
        }

        function render() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const list = document.getElementById('audio-list');
            list.innerHTML = '';
            audioData.forEach(item => {
                if (item.title.toLowerCase().includes(term)) {
                    const card = document.createElement('div');
                    card.className = 'audio-card';
                    card.innerHTML = `
                        <div class="audio-info">
                            <h3>${item.title}</h3>
                            <p>${item.desc}</p>
                        </div>
                        <audio controls src="${item.url}"></audio>
                        <a href="${item.url}" download class="download-btn">ARCHIVE MP3</a>
                    `;
                    list.appendChild(card);
                }
            });
        }
        render();
    </script>
</body>
</html>
