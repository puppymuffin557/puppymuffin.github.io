<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurora Subliminal | 宇宙显化站</title>
    <style>
        :root {
            /* 深色玻璃变量 */
            --glass-panel: rgba(10, 10, 11, 0.7); /* 偏暗的玻璃底色 */
            --card-bg: rgba(255, 255, 255, 0.05);
            --text-color: #ffffff;
            --glass-border: rgba(255, 255, 255, 0.1);
            --invert-val: 1;
        }

        .light-mode {
            /* 浅色玻璃变量 */
            --glass-panel: rgba(245, 245, 247, 0.7); /* 偏亮的玻璃底色 */
            --card-bg: rgba(0, 0, 0, 0.03);
            --text-color: #1d1d1f;
            --glass-border: rgba(0, 0, 0, 0.08);
            --invert-val: 0;
        }

        body, html {
            margin: 0; padding: 0;
            background-color: #000;
            color: var(--text-color);
            font-family: -apple-system, "SF Pro Display", sans-serif;
            transition: color 0.5s ease;
            min-height: 100vh;
        }

        /* 全屏背景图固定不动 */
        .fixed-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://i.pinimg.com/736x/30/3f/f8/303ff83827b904fc55a5f313e1676734.jpg') no-repeat center center;
            background-size: cover;
            z-index: -1;
        }

        /* 切换按钮 */
        .theme-toggle {
            position: fixed; top: 25px; right: 25px; z-index: 100;
            background: var(--card-bg); border: 1px solid var(--glass-border);
            padding: 10px 20px; border-radius: 25px; cursor: pointer;
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            color: var(--text-color); font-size: 0.8rem; transition: 0.3s;
        }

        /* 上半部分 3/4：完全透明，只显示文字 */
        .hero-section {
            height: 70vh; /* 留出一点空间给下方的模糊层 */
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            text-align: center;
        }

        h1 {
            font-size: clamp(2rem, 8vw, 3.5rem); font-weight: 200; 
            letter-spacing: 15px; margin: 0;
            text-shadow: 0 0 30px rgba(255,255,255,0.3);
        }

        /* 下半部分 1/4 开始的模糊面板 */
        .glass-panel {
            position: relative;
            background: var(--glass-panel);
            backdrop-filter: blur(40px) saturate(150%);
            -webkit-backdrop-filter: blur(40px) saturate(150%);
            border-top: 1px solid var(--glass-border);
