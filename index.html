<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURORA | Subliminal Station</title>
    <style>
        :root {
            --panel-bg: rgba(15, 15, 20, 0.65);
            --card-bg: rgba(255, 255, 255, 0.03);
            --text-color: #ffffff;
            --glass-border: rgba(255, 255, 255, 0.08);
            --audio-filter: invert(1);
            --profile-glass-bg: rgba(255, 255, 255, 0.06);
            --profile-text: rgba(255, 255, 255, 0.9);
        }

        .light-mode {
            --panel-bg: rgba(245, 245, 248, 0.6);
            --card-bg: rgba(0, 0, 0, 0.02);
            --text-color: #1a1a1c;
            --glass-border: rgba(0, 0, 0, 0.05);
            --audio-filter: invert(0);
            --profile-glass-bg: rgba(0, 0, 0, 0.03);
            --profile-text: #1a1a1c;
        }

        .background-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000 url('https://i.pinimg.com/736x/30/3f/f8/303ff83827b904fc55a5f313e1676734.jpg') no-repeat center center;
            background-size: cover;
            z-index: -2;
        }

        body {
            margin: 0; padding: 0; min-height: 100vh;
            color: var(--text-color);
            font-family: "Inter", -apple-system, system-ui, sans-serif;
            display: flex; flex-direction: column;
            background: transparent;
        }

        .aurora-title {
            font-size: clamp(3rem, 15vw, 6rem);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 12px;
            margin: 0;
            color: #ffffff;
            text-shadow: 0 0 12px rgba(255, 255, 255, 0.25);
        }

        .hero-spacer {
            min-height: 55vh;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            padding: 40px 20px;
            text-align: center;
        }

        .sub-title {
            font-size: 0.6rem; font-weight: 300; letter-spacing: 5px; opacity: 0.25;
            margin: 15px 0 40px 0; text-transform: uppercase;
        }

        .profile-card {
            width: 300px; height: 120px;
            background: var(--profile-glass-bg);
            backdrop-filter: blur(25px) saturate(105%);
            -webkit-backdrop-filter: blur(25px) saturate(105%);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            display: flex; flex-direction: row;
            align-items: center; padding: 0 25px; gap: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.25);
        }

        .avatar-circle {
            width: 60px; height: 60px; border-radius: 50%; overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            filter: grayscale(15%);
        }
        .avatar-circle img { width: 100%; height: 100%; object-fit: cover; }

        .card-info .name { font-size: 1rem; font-weight: 700; margin: 0; color: var(--profile-text); }
        .card-info .role { font-size: 0.5rem; opacity: 0.5; text-transform: uppercase; margin: 2px 0 5px 0; color: var(--profile-text); }
        .card-info .social { font-size: 0.45rem; opacity: 0.4; line-height: 1.5; color: var(--profile-text); }

        /* --- 核心修改：收窄面板宽度 --- */
        .glass-panel {
            flex-grow: 1;
            background: var(--panel-bg);
            backdrop-filter: blur(50px) saturate(100%);
            -webkit-backdrop-filter: blur(50px) saturate(100%);
            border-radius: 40px 40px 0 0;
            border: 1px solid var(--glass-border);
            padding: 50px 30px 100px 30px; 
            width: 90%; 
            max-width: 580px; /* 从850px降至580px */
            margin: 0 auto;
            display: flex; flex-direction: column; align-items: center;
            box-sizing: border-box;
        }

        #searchInput {
            width: 100%;
            padding: 15px; 
            border-radius: 30px;
            border: 1px solid var(--glass-border); 
            background: rgba(255,255,255,0.03);
            color: var(--text-color); 
            text-align: center; 
            margin-bottom: 40px; 
            outline: none;
            font-size: 0.85rem;
        }

        #audio-list { width: 100%; }
        
        .audio-card {
            background: var(--card-bg); 
            border-radius: 20px; 
            padding: 22px; 
            margin-bottom: 18px;
            border: 1px solid var(--glass-border);
        }

        .audio-info h3 { margin: 0; font-size: 1rem; font-weight: 500; }
        .audio-info p { font-size: 0.75rem; opacity: 0.3; margin: 6px 0 15px 0; }
        
        audio { 
            width: 100%; 
            filter: var(--audio-filter) opacity(0.2); 
            height: 30px; 
        }

        .theme-toggle {
            position: fixed; top: 20px; right: 20px; z-index: 100;
            background: rgba(255, 255, 255, 0.05); border: 1px solid var(--glass-border);
            padding: 8px 15px; border-radius: 20px; cursor: pointer; color: var(--text-color);
            font-size: 0.55rem; opacity: 0.5;
        }
    </style>
</head>
<body>

    <div class="background-overlay"></div>
    <button class="theme-toggle" onclick="document.body.classList.toggle('light-mode')">🌓 MODE</button>

    <div class="hero-spacer">
        <header>
            <h1 class="aurora-title">AURORA</h1>
            <div class="sub-title">局外夏的Subliminal站台</div>
        </header>
        
        <div class="profile-card">
            <div class="avatar-circle">
                <img src="https://i.pinimg.com/736x/f3/9b/01/f39b01a0cb38ea86d3bbad0e419fbdae.jpg" alt="局外夏">
            </div>
            <div class="card-info">
                <p class="name">「局外夏」</p>
                <p class="role">submaker</p>
                <p class="social">bilibili 局外夏<br>YouTube@bulbby-j2m</p>
            </div>
        </div>
    </div>

    <main class="glass-panel">
        <input type="text" id="searchInput" placeholder="探寻深层频率..." oninput="render()">
        <div id="audio-list"></div>
    </main>

    <script>
        const audioData = [
            { title: "[ Wealth ] 888Hz Resonance", desc: "Attract abundance.", url: "#" },
            { title: "[ Healing ] Aurora Mist", desc: "Aura cleansing.", url: "#" }
        ];

        function render() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const list = document.getElementById('audio-list');
            list.innerHTML = '';
            audioData.forEach(item => {
                if (item.title.toLowerCase().includes(term)) {
                    list.innerHTML += `
                        <div class="audio-card">
                            <div class="audio-info"><h3>${item.title}</h3><p>${item.desc}</p></div>
                            <audio controls src="${item.url}"></audio>
                        </div>
                    `;
                }
            });
        }
        render();
    </script>
</body>
</html>
