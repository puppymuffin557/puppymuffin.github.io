<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurora Subliminal | 宇宙显化站</title>
    <style>
        :root {
            --panel-bg: rgba(10, 11, 15, 0.45); 
            --card-bg: rgba(255, 255, 255, 0.03);
            --text-color: #ffffff;
            --glass-border: rgba(255, 255, 255, 0.18); 
            --input-bg: rgba(255, 255, 255, 0.06);
            --header-color: #ffffff;
            --header-shadow: 0 0 25px rgba(255, 255, 255, 0.3);
            --accent-color: rgba(255, 255, 255, 0.8);
        }

        .light-mode {
            --panel-bg: rgba(250, 251, 255, 0.4); 
            --card-bg: rgba(255, 255, 255, 0.25);
            --text-color: #1a1a20;
            --glass-border: rgba(0, 0, 0, 0.08);
            --input-bg: rgba(255, 255, 255, 0.45);
            --header-shadow: 0 0 15px rgba(0, 0, 0, 0.2);
            --accent-color: #1a1a20;
        }

        html {
            height: 100%;
            background: #000 url('https://i.pinimg.com/736x/a5/0b/73/a50b7362c72e720817ac2927c472f84c.jpg') no-repeat center center fixed;
            background-size: cover;
        }

        body {
            margin: 0; padding: 0; min-height: 100vh;
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
            background: transparent;
            display: flex; flex-direction: column;
        }

        /* --- 顶部区域 --- */
        .hero-spacer {
            height: 40vh; 
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }

        header h1 {
            font-size: clamp(2.2rem, 10vw, 2.8rem);
            font-weight: 100; letter-spacing: 20px; margin: 0;
            color: var(--header-color) !important;
            text-shadow: var(--header-shadow);
            text-transform: uppercase;
        }

        /* --- 导航栏 --- */
        nav {
            display: flex; gap: 30px; margin-top: 30px;
        }

        .nav-link {
            font-size: 0.65rem; letter-spacing: 3px; cursor: pointer;
            opacity: 0.4; transition: 0.3s; text-transform: uppercase;
            border-bottom: 1px solid transparent; padding-bottom: 5px;
        }

        .nav-link.active {
            opacity: 1; border-color: var(--accent-color);
        }

        /* --- 主面板 --- */
        .glass-panel {
            flex-grow: 1;
            background: var(--panel-bg);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border-radius: 60px 60px 0 0; 
            border: 1px solid var(--glass-border);
            padding: 50px 40px;
            width: 92%; max-width: 720px; 
            margin: 0 auto;
            transition: all 0.5s ease;
        }

        /* 页面切换动画 */
        .page-content {
            display: none; 
            width: 100%; animation: fadeIn 0.5s ease;
        }

        .page-content.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- 搜索与卡片样式 (保持不变) --- */
        .search-container { width: 100%; max-width: 420px; margin: 0 auto 40px auto; }
        #searchInput {
            width: 100%; padding: 14px 20px; border-radius: 30px;
            border: 1px solid var(--glass-border); background: var(--input-bg);
            color: var(--text-color); text-align: center; outline: none;
            font-size: 0.9rem;
        }
        .audio-card {
            background: var(--card-bg); border: 1px solid var(--glass-border);
            border-radius: 28px; padding: 25px; margin-bottom: 15px;
        }
        audio { width: 100%; filter: invert(1) opacity(0.25); height: 30px; }

        /* --- 功能页占位样式 --- */
        .placeholder-view {
            text-align: center; padding: 40px; opacity: 0.5; font-weight: 200;
        }

        .theme-toggle {
            position: fixed; top: 25px; right: 25px; z-index: 100;
            background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border);
            padding: 10px 20px; border-radius: 20px; cursor: pointer;
            color: var(--text-color); font-size: 0.6rem; letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <button class="theme-toggle" onclick="toggleTheme()">ENERGY MODE</button>

    <div class="hero-spacer">
        <header>
            <h1>AURORA</h1>
        </header>
        <nav>
            <div class="nav-link active" onclick="showPage('audio-page', this)">Station</div>
            <div class="nav-link" onclick="showPage('manifest-page', this)">Manifest</div>
            <div class="nav-link" onclick="showPage('settings-page', this)">Settings</div>
        </nav>
    </div>

    <main class="glass-panel">
        <div id="audio-page" class="page-content active">
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="Whisper your intent..." oninput="render()">
            </div>
            <div id="audio-list"></div>
        </div>

        <div id="manifest-page" class="page-content">
            <div class="placeholder-view">
                <h3>MANIFESTATION SPACE</h3>
                <p>沉思你的愿望，让频率与之共鸣。</p>
                <div style="border: 1px solid var(--glass-border); padding: 20px; border-radius: 20px; margin-top: 20px;">
                    即将开启：意图记录仪与冥想计时
                </div>
            </div>
        </div>

        <div id="settings-page" class="page-content">
            <div class="placeholder-view">
                <h3>SETTINGS</h3>
                <p>调整你的感知场。</p>
            </div>
        </div>
    </main>

    <script>
        const audioData = [
            { title: "Quantum Abundance", desc: "Sync with the resonance of limitless flow.", url: "#" },
            { title: "Inner Stillness", desc: "Dissolve the noise and return to the void.", url: "#" }
        ];

        function toggleTheme() {
            document.body.classList.toggle('light-mode');
        }

        // 核心功能：切换页面
        function showPage(pageId, navElement) {
            // 隐藏所有页面
            document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
            // 激活当前页面
            document.getElementById(pageId).classList.add('active');
            
            // 更新导航栏状态
            document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
            navElement.classList.add('active');
        }

        function render() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const list = document.getElementById('audio-list');
            list.innerHTML = '';
            audioData.forEach(item => {
                if (item.title.toLowerCase().includes(term)) {
                    list.innerHTML += `
                        <div class="audio-card">
                            <div class="audio-info">
                                <h3>${item.title}</h3>
                                <p>${item.desc}</p>
                            </div>
                            <audio controls src="${item.url}"></audio>
                        </div>
                    `;
                }
            });
        }
        render();
    </script>
</body>
</html>
