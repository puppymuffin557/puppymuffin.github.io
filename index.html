<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurora Subliminal | 宇宙显化站</title>
    <style>
        :root {
            /* 深色模式：暗色玻璃 */
            --panel-bg: rgba(10, 10, 12, 0.7);
            --card-bg: rgba(255, 255, 255, 0.05);
            --text-color: #ffffff;
            --glass-border: rgba(255, 255, 255, 0.1);
            --audio-filter: invert(1);
        }

        .light-mode {
            /* 浅色模式：明亮玻璃 */
            --panel-bg: rgba(255, 255, 255, 0.5);
            --card-bg: rgba(255, 255, 255, 0.4);
            --text-color: #1d1d1f;
            --glass-border: rgba(0, 0, 0, 0.05);
            --audio-filter: invert(0);
        }

        body, html {
            margin: 0; padding: 0;
            background: #000;
            color: var(--text-color);
            font-family: -apple-system, "SF Pro Display", sans-serif;
            transition: color 0.5s ease;
        }

        /* 全屏背景图锁定 */
        .fixed-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://i.pinimg.com/736x/30/3f/f8/303ff83827b904fc55a5f313e1676734.jpg') no-repeat center center;
            background-size: cover;
            z-index: -1;
        }

        /* 顶部 3/4 的透明留空区 */
        .hero-spacer {
            height: 65vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        header h1 {
            font-size: clamp(2rem, 10vw, 3.5rem); 
            font-weight: 200; letter-spacing: 12px; margin: 0;
            text-shadow: 0 0 30px rgba(255,255,255,0.3);
        }

        /* 核心改动：下半部分的毛玻璃大面板 */
        .glass-panel {
            min-height: 40vh;
            background: var(--panel-bg);
            backdrop-filter: blur(60px); /* 极高模糊度 */
            -webkit-backdrop-filter: blur(60px);
            border-top: 1px solid var(--glass-border);
            padding: 60px 20px 100px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: background 0.5s ease;
        }

        /* 搜索框在面板内悬浮 */
        .search-container {
            width: 100%; max-width: 500px; margin-bottom: 50px;
        }

        #searchInput {
            width: 100%; padding: 18px; border-radius: 40px;
            border: 1px solid var(--glass-border);
            background: rgba(255,255,255,0.1);
            color: var(--text-color);
            text-align: center; outline: none;
            font-size: 1rem;
        }

        #audio-list { width: 100%; max-width: 700px; display: grid; gap: 20px; }

        .audio-card {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-radius: 24px; padding: 25px;
            transition: 0.3s;
        }

        .audio-card:hover { transform: translateY(-5px); background: rgba(255,255,255,0.15); }

        audio { width: 100%; filter: var(--audio-filter); opacity: 0.6; margin-top: 15px; }

        .theme-toggle {
            position: fixed; top: 25px; right: 25px; z-index: 100;
            background: rgba(255,255,255,0.1); border: 1px solid var(--glass-border);
            padding: 8px 15px; border-radius: 20px; cursor: pointer;
            color: var(--text-color); backdrop-filter: blur(10px);
        }

        .download-btn {
            display: inline-block; margin-top: 15px;
            color: var(--text-color); opacity: 0.5;
            text-decoration: none; font-size: 0.7rem;
            border: 1px solid var(--glass-border);
            padding: 5px 15px; border-radius: 15px;
        }
    </style>
</head>
<body>

    <div class="fixed-bg"></div>
    <button class="theme-toggle" onclick="toggleTheme()">🌓 能量模式</button>

    <div class="hero-spacer">
        <header>
            <h1>AURORA</h1>
            <p style="letter-spacing: 5px; opacity: 0.6; margin-top: 15px;">QUANTUM RESONANCE</p>
        </header>
    </div>

    <main class="glass-panel">
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="搜索频率..." oninput="render()">
        </div>
        <div id="audio-list"></div>
    </main>

    <script>
        const audioData = [
            { title: "[ 财富显化 ] 纯金频率", desc: "888Hz 财富磁场清理。", url: "#" },
            { title: "[ 深度修复 ] 极光之沐", desc: "清理潜意识负面限制。", url: "#" }
        ];

        function toggleTheme() {
            document.body.classList.toggle('light-mode');
        }

        function render() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const list = document.getElementById('audio-list');
            list.innerHTML = '';
            audioData.forEach(item => {
                if (item.title.toLowerCase().includes(term)) {
                    const card = document.createElement('div');
                    card.className = 'audio-card';
                    card.innerHTML = `
                        <h3>${item.title}</h3>
                        <p>${item.desc}</p>
                        <audio controls src="${item.url}"></audio>
                        <a href="${item.url}" download class="download-btn">DOWNLOAD</a>
                    `;
                    list.appendChild(card);
                }
            });
        }
        render();
    </script>
</body>
</html>
