<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurora Subliminal | 宇宙显化站</title>
    <style>
        :root {
            /* 针对新背景优化的色彩变量 */
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
            --accent-glow: rgba(183, 132, 247, 0.3);
            --text-main: #ffffff;
        }

        body {
            margin: 0; padding: 0;
            /* 使用你提供的新背景图 */
            background: url('https://i.pinimg.com/736x/30/3f/f8/303ff83827b904fc55a5f313e1676734.jpg') no-repeat center center fixed;
            background-size: cover;
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", sans-serif;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* 顶部装饰 */
        header {
            width: 100%; padding: 100px 0 40px 0; text-align: center;
        }

        h1 {
            font-size: 3.5rem; font-weight: 200; letter-spacing: 12px; margin: 0;
            text-shadow: 0 0 20px rgba(255,255,255,0.4);
            text-transform: uppercase;
            animation: fadeIn 2s ease-out;
        }

        .subtitle {
            font-size: 0.85rem; opacity: 0.6; letter-spacing: 5px; margin-top: 20px;
            font-weight: 300;
        }

        /* 极简毛玻璃搜索框 */
        .search-container {
            margin: 30px 0 60px 0; width: 85%; max-width: 500px;
        }

        #searchInput {
            width: 100%; padding: 20px 30px; border-radius: 50px;
            border: 1px solid var(--glass-border);
            background: var(--glass-bg);
            color: white; font-size: 1rem; outline: none;
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: all 0.5s ease;
            text-align: center;
        }

        #searchInput:focus {
            border-color: rgba(255,255,255,0.4);
            background: rgba(255,255,255,0.12);
            box-shadow: 0 0 40px var(--accent-glow);
        }

        /* 音频卡片流 */
        #audio-list {
            width: 90%; max-width: 700px; display: grid; gap: 30px; padding-bottom: 120px;
        }

        .audio-card {
            background: var(--glass-bg);
            backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border);
            border-radius: 35px; padding: 35px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .audio-card:hover {
            transform: scale(1.02);
            border-color: rgba(255,255,255,0.5);
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
        }

        .audio-info h3 {
            margin: 0 0 12px 0; font-weight: 300; font-size: 1.4rem; letter-spacing: 1px;
        }

        .audio-info p {
            font-size: 0.9rem; opacity: 0.5; margin-bottom: 25px; font-weight: 300;
        }

        /* 播放器美化 */
        audio {
            width: 100%; filter: invert(1) hue-rotate(280deg) opacity(0.6);
        }

        .actions {
            margin-top: 20px; display: flex; justify-content: space-between;
