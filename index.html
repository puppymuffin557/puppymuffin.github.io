<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurora Subliminal | 宇宙显化站</title>
    <style>
        :root {
            --panel-bg: rgba(10, 11, 15, 0.45); 
            --card-bg: rgba(255, 255, 255, 0.03);
            --text-color: #ffffff;
            --glass-border: rgba(255, 255, 255, 0.18); 
            --input-bg: rgba(255, 255, 255, 0.06);
            --header-color: #ffffff;
            --header-shadow: 0 0 25px rgba(255, 255, 255, 0.3);
            --accent-color: rgba(255, 255, 255, 0.8);
        }

        .light-mode {
            --panel-bg: rgba(250, 251, 255, 0.4); 
            --card-bg: rgba(255, 255, 255, 0.25);
            --text-color: #1a1a20;
            --glass-border: rgba(0, 0, 0, 0.08);
            --input-bg: rgba(255, 255, 255, 0.45);
            --header-shadow: 0 0 15px rgba(0, 0, 0, 0.2);
            --accent-color: #1a1a20;
        }

        html {
            height: 100%;
            background: #000 url('https://i.pinimg.com/736x/a5/0b/73/a50b7362c72e720817ac2927c472f84c.jpg') no-repeat center center fixed;
            background-size: cover;
        }

        body {
            margin: 0; padding: 0; min-height: 100vh;
            color: var(--text-color);
            font-family: -apple-system, sans-serif;
            background: transparent;
            display: flex; flex-direction: column;
        }

        .hero-spacer { height: 35vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        header h1 {
            font-size: 2.5rem; font-weight: 100; letter-spacing: 20px; margin: 0;
            color: var(--header-color) !important; text-shadow: var(--header-shadow);
        }

        /* 导航栏滚动条适配 */
        nav { display: flex; gap: 20px; margin-top: 25px; overflow-x: auto; max-width: 90%; padding-bottom: 10px; }
        .nav-link { font-size: 0.6rem; letter-spacing: 2px; cursor: pointer; opacity: 0.4; transition: 0.3s; text-transform: uppercase; white-space: nowrap; }
        .nav-link.active { opacity: 1; border-bottom: 1px solid var(--accent-color); padding-bottom: 4px; }

        .glass-panel {
            flex-grow: 1; background: var(--panel-bg); backdrop-filter: blur(40px);
            border-radius: 60px 60px 0 0; border: 1px solid var(--glass-border);
            padding: 40px 30px; width: 92%; max-width: 720px; margin: 0 auto;
        }

        .page-content { display: none; width: 100%; animation: fadeIn 0.4s ease; }
        .page-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* 通用输入框与按钮 */
        textarea, input[type="text"] {
            width: 100%; background: var(--input-bg); border: 1px solid var(--glass-border);
            border-radius: 15px; padding: 12px; color: var(--text-color); outline: none; margin-bottom: 15px;
        }
        .action-btn {
            background: var(--card-bg); border: 1px solid var(--glass-border); color: var(--text-color);
            padding: 10px 20px; border-radius: 20px; cursor: pointer; font-size: 0.7rem; letter-spacing: 1px;
        }

        /* 列表卡片样式 */
        .record-card {
            background: var(--card-bg); border: 1px solid var(--glass-border);
            border-radius: 20px; padding: 20px; margin-bottom: 15px; font-size: 0.85rem;
        }

        .tag { font-size: 0.6rem; opacity: 0.5; margin-bottom: 5px; display: block; }
    </style>
</head>
<body>

    <div class="hero-spacer">
        <header><h1>AURORA</h1></header>
        <nav>
            <div class="nav-link active" onclick="showPage('page-audio', this)">Station</div>
            <div class="nav-link" onclick="showPage('page-diary', this)">Diary</div>
            <div class="nav-link" onclick="showPage('page-order', this)">Universe Order</div>
            <div class="nav-link" onclick="showPage('page-sp', this)">SP Record</div>
            <div class="nav-link" onclick="showPage('page-kdy', this)">KDY Generator</div>
        </nav>
    </div>

    <main class="glass-panel">
        <div id="page-audio" class="page-content active">
            <input type="text" id="searchInput" placeholder="搜索音频意图..." oninput="renderAudio()">
            <div id="audio-list"></div>
        </div>

        <div id="page-diary" class="page-content">
            <textarea id="diaryInput" rows="4" placeholder="写下现在的感恩与感受..."></textarea>
            <button class="action-btn" onclick="saveDiary()">存入潜意识</button>
            <div id="diary-history" style="margin-top: 30px;"></div>
        </div>

        <div id="page-order" class="page-content">
            <input type="text" id="orderInput" placeholder="请输入你的愿望订单...">
            <button class="action-btn" onclick="placeOrder()">发送至宇宙</button>
            <div id="order-list" style="margin-top: 30px;"></div>
        </div>

        <div id="page-sp" class="page-content">
            <input type="text" id="spStatus" placeholder="当前互动状态/显化点...">
            <button class="action-btn" onclick="addSPRecord()">记录桥梁事件</button>
            <div id="sp-list" style="margin-top: 30px;"></div>
        </div>

        <div id="page-kdy" class="page-content">
            <div style="font-size: 0.8rem; margin-bottom: 20px; opacity: 0.7;">输入核心目标，自动生成KDY肯定句：</div>
            <input type="text" id="kdyTarget" placeholder="例如：拥有一亿财富">
            <button class="action-btn" onclick="generateKDY()">生成公式</button>
            <div id="kdy-result" style="margin-top: 20px;"></div>
        </div>
    </main>

    <script>
        // 页面切换
        function showPage(id, el) {
            document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
        }

        // 显化日记逻辑
        function saveDiary() {
            const text = document.getElementById('diaryInput').value;
            if(!text) return;
            const container = document.getElementById('diary-history');
            const date = new Date().toLocaleDateString();
            container.innerHTML = `<div class="record-card"><span class="tag">${date}</span>${text}</div>` + container.innerHTML;
            document.getElementById('diaryInput').value = '';
        }

        // 宇宙订单逻辑
        function placeOrder() {
            const val = document.getElementById('orderInput').value;
            if(!val) return;
            const container = document.getElementById('order-list');
            container.innerHTML = `
                <div class="record-card" style="border-left: 2px solid #fff;">
                    <span class="tag">ORDER PLACED: ${new Date().toLocaleTimeString()}</span>
                    目标：${val} <br>
                    <span style="font-size:0.6rem; color:#00ff88;">● 宇宙配送中... 已成交</span>
                </div>` + container.innerHTML;
            document.getElementById('orderInput').value = '';
        }

        // SP记录逻辑
        function addSPRecord() {
            const val = document.getElementById('spStatus').value;
            if(!val) return;
            const container = document.getElementById('sp-list');
            container.innerHTML = `<div class="record-card"><span class="tag">BRIDGE EVENT</span>${val}</div>` + container.innerHTML;
            document.getElementById('spStatus').value = '';
        }

        // KDY生成逻辑
        function generateKDY() {
            const target = document.getElementById('kdyTarget').value;
            if(!target) return;
            const templates = [
                `为什么我能如此轻松地${target}？`,
                `我正在变得越来越接近${target}。`,
                `我很感激我已经${target}了。`
            ];
            const container = document.getElementById('kdy-result');
            container.innerHTML = templates.map(t => `<div class="record-card">${t}</div>`).join('');
        }

        // 默认音频渲染
        function renderAudio() {
            const list = document.getElementById('audio-list');
            list.innerHTML = `<div class="audio-card"><h3>Quantum Flow</h3><p>宇宙能量调频</p><audio controls></audio></div>`;
        }
        renderAudio();
    </script>
</body>
</html>
