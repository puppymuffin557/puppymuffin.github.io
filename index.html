<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurora | 灵性空间</title>
    <style>
        :root {
            --panel-bg: rgba(10, 10, 15, 0.45);
            --card-bg: rgba(255, 255, 255, 0.04);
            --text-color: #ffffff;
            --glass-border: rgba(255, 255, 255, 0.15); 
        }

        html {
            height: 100%;
            /* 使用这张极具艺术感的红黑/深蓝图 */
            background: #000 url('https://i.pinimg.com/736x/08/49/cc/0849ccf02d7fb8846b320ea97b75fc24.jpg') no-repeat center top fixed;
            background-size: cover;
        }

        body {
            margin: 0; padding: 0;
            min-height: 100vh;
            color: var(--text-color);
            font-family: "PingFang SC", "SF Pro Display", sans-serif;
            background: transparent;
            display: flex; flex-direction: column;
        }

        /* 核心改动：把顶部留白拉得非常大，让图片露出来 */
        .hero-spacer {
            height: 72vh; /* 把面板压低，让图片的主体内容完整呈现 */
            display: flex;
            justify-content: center;
            align-items: flex-end; /* 标题沉到底部边缘 */
            padding-bottom: 20px;
        }

        header h1 {
            font-size: 2rem;
            font-weight: 100; letter-spacing: 20px; margin: 0;
            text-shadow: 0 0 20px rgba(0,0,0,0.8);
            opacity: 0.8;
            text-transform: uppercase;
        }

        /* 玻璃面板：做得更像是一个可以拉起的“托盘” */
        .glass-panel {
            flex-grow: 1;
            background: var(--panel-bg);
            backdrop-filter: blur(40px) brightness(0.8);
            -webkit-backdrop-filter: blur(40px) brightness(0.8);
            
            border-radius: 40px 40px 0 0;
            border: 1px solid var(--glass-border);
            border-bottom: none;
            
            padding: 40px 25px 80px 25px;
            width: 100%; /* 填满宽度，保持这种冷峻的艺术感 */
            max-width: 900px;
            margin: 0 auto;
            display: flex; flex-direction: column; align-items: center;
        }

        .search-container {
            width: 100%; max-width: 350px; margin-bottom: 30px;
        }

        #searchInput {
            width: 100%; padding: 12px; border-radius: 0; /* 甚至可以尝试直角，更有艺术感 */
            border: none; border-bottom: 1px solid var(--glass-border);
            background: transparent;
            color: var(--text-color);
            text-align: center; outline: none;
            font-size: 0.9rem; letter-spacing: 2px;
        }

        #audio-list { width: 100%; max-width: 600px; display: grid; gap: 20px; }

        .audio-card {
            background: var(--card-bg);
            border-left: 2px solid var(--glass-border); /* 只留左边线，更有设计感 */
            padding: 20px;
            transition: 0.3s;
        }

        .audio-card:hover { background: rgba(255,255,255,0.08); }

        .audio-info h3 { margin: 0; font-weight: 300; font-size: 1.1rem; letter-spacing: 1px; }
        .audio-info p { font-size: 0.8rem; opacity: 0.4; margin: 10px 0 15px 0; }

        audio { width: 100%; filter: invert(1) opacity(0.2); height: 30px; }

        .theme-toggle {
            position: fixed; top: 20px; left: 20px; z-index: 100;
            background: none; border: none; cursor: pointer;
            color: var(--text-color); opacity: 0.3; font-size: 0.7rem;
        }
    </style>
</head>
<body>

    <button class="theme-toggle" onclick="document.body.classList.toggle('light-mode')">MODE</button>

    <div class="hero-spacer">
        <header>
            <h1>AURORA</h1>
        </header>
    </div>

    <main class="glass-panel">
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="SYNCING..." oninput="render()">
        </div>
        <div id="audio-list"></div>
    </main>

    <script>
        const audioData = [
            { title: "VOID RESONANCE", desc: "Return to the zero point of consciousness.", url: "#" },
            { title: "CRIMSON FLOW", desc: "Awaken the dormant energy within.", url: "#" }
        ];

        function render() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const list = document.getElementById('audio-list');
            list.innerHTML = '';
            audioData.forEach(item => {
                if (item.title.toLowerCase().includes(term)) {
                    const card = document.createElement('div');
                    card.className = 'audio-card';
                    card.innerHTML = `
                        <div class="audio-info">
                            <h3>${item.title}</h3>
                            <p>${item.desc}</p>
                        </div>
                        <audio controls src="${item.url}"></audio>
                    `;
                    list.appendChild(card);
                }
            });
        }
        render();
    </script>
</body>
</html>
