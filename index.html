<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurora Subliminal | 宇宙显化站</title>
    <style>
        :root {
            --panel-bg: rgba(10, 10, 15, 0.7);
            --card-bg: rgba(255, 255, 255, 0.05);
            --text-color: #ffffff;
            --glass-border: rgba(255, 255, 255, 0.15);
            --audio-filter: invert(1);
        }

        .light-mode {
            --panel-bg: rgba(255, 255, 255, 0.5);
            --card-bg: rgba(255, 255, 255, 0.4);
            --text-color: #1a1a1c;
            --glass-border: rgba(0, 0, 0, 0.1);
            --audio-filter: invert(0);
        }

        html {
            height: 100%;
            /* 锁定你最爱的这张星空背景 */
            background: #000 url('https://i.pinimg.com/736x/ad/b6/7f/adb67fb86f8d24c19ae43945ef4aca1b.jpg') no-repeat center top fixed;
            background-size: cover;
        }

        body {
            margin: 0; padding: 0; min-height: 100vh;
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            background: transparent;
            display: flex; flex-direction: column;
            transition: color 0.4s ease;
        }

        .hero-spacer {
            height: 55vh; /* 留出足够的星空展示空间 */
            display: flex; justify-content: center; align-items: center;
        }

        header h1 {
            font-size: clamp(2rem, 10vw, 3rem);
            font-weight: 100; letter-spacing: 15px; margin: 0;
            text-shadow: 0 0 20px rgba(255,255,255,0.3);
            text-transform: uppercase;
        }

        .glass-panel {
            flex-grow: 1;
            background: var(--panel-bg);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border-radius: 40px 40px 0 0; 
            border: 1px solid var(--glass-border);
            border-bottom: none;
            box-shadow: 0 -20px 40px rgba(0,0,0,0.4);
            padding: 40px 20px 100px 20px;
            width: 92%; max-width: 850px;
            margin: 0 auto;
            display: flex; flex-direction: column; align-items: center;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .search-container { width: 100%; max-width: 450px; margin-bottom: 30px; }
        #searchInput {
            width: 100%; padding: 15px 25px; border-radius: 30px;
            border: 1px solid var(--glass-border);
            background: rgba(255,255,255,0.05);
            color: var(--text-color);
            text-align: center; outline: none;
            backdrop-filter: blur(10px);
        }

        #audio-list { width: 100%; max-width: 650px; display: grid; gap: 15px; }
        .audio-card {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px; padding: 25px;
            transition: 0.3s ease;
        }
        .audio-card:hover { transform: translateY(-2px); background: rgba(255,255,255,0.1); }

        .audio-info h3 { margin: 0; font-weight: 300; font-size: 1.2rem; }
        .audio-info p { font-size: 0.8rem; opacity: 0.4; margin: 8px 0 15px 0; }

        audio { width: 100%; filter: var(--audio-filter) opacity(0.5); height: 35px; }

        .theme-toggle {
            position: fixed; top: 20px; right: 20px; z-index: 100;
            background: rgba(255,255,255,0.1); border: 1px solid var(--glass-border);
            padding: 8px 16px; border-radius: 20px; cursor: pointer; color: var(--text-color);
            font-size: 0.7rem;
        }
    </style>
</head>
<body>

    <button class="theme-toggle" onclick="document.body.classList.toggle('light-mode')">🌓 MODE</button>

    <div class="hero-spacer">
        <header>
            <h1>AURORA</h1>
            <p style="letter-spacing: 5px; opacity: 0.4; font-size: 0.7rem; margin-top: 10px;">Quantum Frequency</p>
        </header>
    </div>

    <main class="glass-panel">
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Search Frequency..." oninput="render()">
        </div>
        <div id="audio-list"></div>
    </main>

    <script>
        const audioData = [
            { title: "[ Wealth ] 888Hz Resonance", desc: "Attract abundance and clear financial blockages.", url: "#" },
            { title: "[ Healing ] Aurora Mist", desc: "Subconscious repair and aura cleansing.", url: "#" }
        ];

        function render() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const list = document.getElementById('audio-list');
            list.innerHTML = '';
            audioData.forEach(item => {
                if (item.title.toLowerCase().includes(term)) {
                    const card = document.createElement('div');
                    card.className = 'audio-card';
                    card.innerHTML = `
                        <div class="audio-info"><h3>${item.title}</h3><p>${item.desc}</p></div>
                        <audio controls src="${item.url}"></audio>
                    `;
                    list.appendChild(card);
                }
            });
        }
        render();
    </script>
</body>
</html>
