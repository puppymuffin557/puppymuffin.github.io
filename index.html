<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurora Subliminal | 宇宙显化站</title>
    <style>
        :root {
            /* 默认深色模式变量 */
            --bg-color: #0a0a0b;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text-color: #ffffff;
            --glass-border: rgba(255, 255, 255, 0.1);
            --blur-val: 30px;
        }

        /* 浅色模式变量 */
        .light-mode {
            --bg-color: #f5f5f7;
            --card-bg: rgba(0, 0, 0, 0.03);
            --text-color: #1d1d1f;
            --glass-border: rgba(0, 0, 0, 0.1);
        }

        body, html {
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, "SF Pro Display", sans-serif;
            transition: background-color 0.5s ease;
            overflow-x: hidden;
        }

        /* 3:4 沉浸式背景大图 */
        .hero-bg {
            position: relative;
            width: 100%;
            height: 75vh; /* 占画面的 3/4 */
            background: url('https://i.pinimg.com/736x/30/3f/f8/303ff83827b904fc55a5f313e1676734.jpg') no-repeat center center;
            background-size: cover;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1;
        }

        /* 渐变遮罩：让图片平滑过渡到纯色 */
        .hero-bg::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; width: 100%; height: 30%;
            background: linear-gradient(to bottom, transparent, var(--bg-color));
        }

        /* 深浅色切换按钮 */
        .theme-toggle {
            position: fixed;
            top: 25px; right: 25px;
            z-index: 100;
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            font-size: 0.8rem;
            color: var(--text-color);
            letter-spacing: 1px;
            transition: 0.3s;
        }

        header h1 {
            font-size: 3.5rem; font-weight: 200; letter-spacing: 15px; margin: 0;
            text-shadow: 0 0 30px rgba(255,255,255,0.3);
            position: relative; z-index: 2;
        }

        /* 内容容器 */
        .content-area {
            position: relative;
            background-color: var(--bg-color);
            width: 100%;
            min-height: 25vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: -50px; /* 略微向上覆盖背景，产生层次感 */
            z-index: 5;
            padding-bottom: 100px;
        }

        .search-container {
            width: 85%; max-width: 500px; margin-bottom: 50px;
        }

        #searchInput {
            width: 100%; padding: 18px; border-radius: 40px;
            border: 1px solid var(--glass-border);
            background: var(--card-bg);
            color: var(--text-color);
            text-align: center;
            outline: none;
            backdrop-filter: blur(var(--blur-val));
            font-size: 1rem;
        }

        #audio-list { width: 90%; max-width: 700px; display: grid; gap: 30px; }

        .audio-card {
            background: var(--card-bg);
            backdrop-filter: blur(var(--blur-val));
            -webkit-backdrop-filter: blur(var(--blur-val));
            border: 1px solid var(--glass-border);
            border-radius: 35px; padding: 35px;
            transition: 0.4s cubic-bezier(0.2, 0, 0.2, 1);
        }

        .audio-card:hover { transform: translateY(-10px); }

        .audio-info h3 { margin: 0 0 10px 0; font-weight: 300; font-size: 1.5rem; }
        .audio-info p { font-size: 0.9rem; opacity: 0.5; line-height: 1.6; }

        audio { width: 100%; filter: invert(var(--invert-val, 1)); opacity: 0.6; margin-top: 15px; }

        .download-btn {
            display: inline-block; margin-top: 20px;
            color: var(--text-color); opacity: 0.4;
            text-decoration: none; font-size: 0.75rem;
            border: 1px solid var(--glass-border);
            padding: 8px 20px; border-radius: 30px;
        }
        
        .download-btn:hover { opacity: 1; background: var(--text-color); color: var(--bg-color); }

    </style>
</head>
<body>

    <button class="theme-toggle" onclick="toggleTheme()">🌓 切换能量模式</button>

    <div class="hero-bg">
        <header>
            <h1>AURORA</h1>
            <p style="letter-spacing: 5px; opacity: 0.6; margin-top: 20px;">QUANTUM RESONANCE</p>
        </header>
    </div>

    <div class="content-area">
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="搜索你的频率..." oninput="render()">
        </div>
        <div id="audio-list"></div>
    </div>

    <script>
        // 核心数据
        const audioData = [
            {
                title: "[ 财富显化 ] 纯金频率",
                desc: "888Hz 财富磁场清理，吸引丰盛能量流向你。",
                url: "https://www.w3schools.com/html/horse.mp3"
            },
            {
                title: "[ 深度修复 ] 极光之沐",
                desc: "清理潜意识负面限制，修复身心磁场。",
                url: "https://www.w3schools.com/html/horse.mp3"
            }
        ];

        // 切换主题功能
        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            const isLight = document.body.classList.contains('light-mode');
            document.documentElement.style.setProperty('--invert-val', isLight ? '0' : '1');
        }

        function render() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const list = document.getElementById('audio-list');
            list.innerHTML = '';
            audioData.forEach(item => {
                if (item.title.toLowerCase().includes(term)) {
                    const card = document.createElement('div');
                    card.className = 'audio-card';
                    card.innerHTML = `
                        <div class="audio-info">
                            <h3>${item.title}</h3>
                            <p>${item.desc}</p>
                        </div>
                        <audio controls src="${item.url}"></audio>
                        <div style="display:flex; justify-content:space-between; align-items:center">
                            <a href="${item.url}" download class="download-btn">DOWNLOAD</a>
                            <span style="font-size:0.6rem; opacity:0.2; margin-top:20px;">AURORA OS v2.5</span>
                        </div>
                    `;
                    list.appendChild(card);
                }
            });
        }
        render();
    </script>
</body>
</html>
