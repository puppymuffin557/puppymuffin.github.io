<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurora | 灵性空间</title>
    <style>
        :root {
            /* 深色模式变量 */
            --panel-bg: rgba(10, 10, 15, 0.45);
            --card-bg: rgba(255, 255, 255, 0.04);
            --text-color: #ffffff;
            --glass-border: rgba(255, 255, 255, 0.15);
            --audio-filter: invert(1);
        }

        /* 修复：找回浅色模式变量 */
        .light-mode {
            --panel-bg: rgba(255, 255, 255, 0.4);
            --card-bg: rgba(0, 0, 0, 0.03);
            --text-color: #1a1a1a;
            --glass-border: rgba(0, 0, 0, 0.1);
            --audio-filter: invert(0);
        }

        html {
            height: 100%;
            /* 依然使用这张艺术构图背景 */
            background: #000 url('https://i.pinimg.com/736x/08/49/cc/0849ccf02d7fb8846b320ea97b75fc24.jpg') no-repeat center top fixed;
            background-size: cover;
        }

        body {
            margin: 0; padding: 0;
            min-height: 100vh;
            color: var(--text-color);
            font-family: -apple-system, "PingFang SC", sans-serif;
            background: transparent;
            display: flex; flex-direction: column;
            transition: color 0.4s ease;
        }

        /* 保持 70% 以上的留白，防止遮挡图片主体 */
        .hero-spacer {
            height: 70vh; 
            display: flex;
            justify-content: center;
            align-items: flex-end;
            padding-bottom: 30px;
        }

        header h1 {
            font-size: 1.8rem;
            font-weight: 100; letter-spacing: 18px; margin: 0;
            text-shadow: 0 0 20px rgba(0,0,0,0.5);
            opacity: 0.8;
            text-transform: uppercase;
        }

        /* 悬浮玻璃面板 */
        .glass-panel {
            flex-grow: 1;
            background: var(--panel-bg);
            backdrop-filter: blur(40px) saturate(150%);
            -webkit-backdrop-filter: blur(40px) saturate(150%);
            
            border-radius: 40px 40px 0 0;
            border: 1px solid var(--glass-border);
            border-bottom: none;
            
            padding: 40px 25px 100px 25px;
            width: 94%; max-width: 800px;
            margin: 0 auto;
            display: flex; flex-direction: column; align-items: center;
            transition: background 0.5s ease;
        }

        .search-container {
            width: 100%; max-width: 350px; margin-bottom: 35px;
        }

        #searchInput {
            width: 100%; padding: 12px; border: none;
            border-bottom: 1px solid var(--glass-border);
            background: transparent;
            color: var(--text-color);
            text-align: center; outline: none;
            font-size: 0.9rem; letter-spacing: 2px;
        }

        #audio-list { width: 100%; max-width: 600px; display: grid; gap: 15px; }

        .audio-card {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 20px;
            transition: 0.3s;
            border: 1px solid var(--glass-border);
        }

        .audio-card:hover { background: rgba(255,255,255,0.1); }

        .audio-info h3 { margin: 0; font-weight: 300; font-size: 1.1rem; letter-spacing: 1px; }
        .audio-info p { font-size: 0.8rem; opacity: 0.5; margin: 8px 0 15px 0; }

        audio { width: 100%; filter: var(--audio-filter); opacity: 0.4; height: 32px; }

        /* 模式切换按钮 */
        .theme-toggle {
            position: fixed; top: 25px; right: 25px; z-index: 100;
            background: rgba(255,255,255,0.1); border: 1px solid var(--glass-border);
            padding: 8px 15px; border-radius: 20px; cursor: pointer;
            color: var(--text-color); backdrop-filter: blur(10px);
            font-size: 0.7rem; letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <button class="theme-toggle" onclick="document.body.classList.toggle('light-mode')">🌓 ENERGY MODE</button>

    <div class="hero-spacer">
        <header>
            <h1>AURORA</h1>
        </header>
    </div>

    <main class="glass-panel">
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="SYNCING..." oninput="render()">
        </div>
        <div id="audio-list"></div>
    </main>

    <script>
        const audioData = [
            { title: "VOID RESONANCE", desc: "Return to the zero point of consciousness.", url: "#" },
            { title: "CRIMSON FLOW", desc: "Awaken the dormant energy within.", url: "#" }
        ];

        function render() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const list = document.getElementById('audio-list');
            list.innerHTML = '';
            audioData.forEach(item => {
                if (item.title.toLowerCase().includes(term)) {
                    const card = document.createElement('div');
                    card.className = 'audio-card';
                    card.innerHTML = `
                        <div class="audio-info">
                            <h3>${item.title}</h3>
                            <p>${item.desc}</p>
                        </div>
                        <audio controls src="${item.url}"></audio>
                    `;
                    list.appendChild(card);
                }
            });
        }
        render();
    </script>
</body>
</html>
