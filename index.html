<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURORA | Subliminal Station</title>
    <style>
        :root {
            --panel-bg: rgba(10, 10, 15, 0.72);
            --card-bg: rgba(255, 255, 255, 0.05);
            --text-color: #ffffff;
            --glass-border: rgba(255, 255, 255, 0.15);
            --audio-filter: invert(1);
            --avatar-box-bg: #ffffff;
            --glow-color: rgba(255, 255, 255, 0.6);
        }

        .light-mode {
            --panel-bg: rgba(250, 250, 252, 0.65);
            --card-bg: rgba(0, 0, 0, 0.03);
            --text-color: #1a1a1c;
            --glass-border: rgba(0, 0, 0, 0.1);
            --audio-filter: invert(0);
            --glow-color: rgba(0, 0, 0, 0.1); /* 浅色模式下白光转为淡淡投影 */
        }

        .background-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000 url('https://i.pinimg.com/736x/30/3f/f8/303ff83827b904fc55a5f313e1676734.jpg') no-repeat center center;
            background-size: cover;
            z-index: -2;
        }

        body {
            margin: 0; padding: 0; min-height: 100vh;
            color: var(--text-color);
            font-family: "Inter", -apple-system, system-ui, sans-serif;
            display: flex; flex-direction: column;
            background: transparent;
        }

        /* --- 纯白发光标题核心 --- */
        .aurora-title {
            font-size: clamp(3.5rem, 18vw, 7rem);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 12px; /* 进一步拉开间距，更显空灵 */
            margin: 0;
            color: #ffffff;
            /* 多层文本阴影营造白光扩散感 */
            text-shadow: 
                0 0 10px rgba(255, 255, 255, 0.3),
                0 0 20px rgba(255, 255, 255, 0.2),
                0 0 40px rgba(255, 255, 255, 0.1);
            transition: all 0.5s ease;
        }

        /* 浅色模式下标题变黑，取消发光 */
        .light-mode .aurora-title {
            color: #1a1a1c;
            text-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .hero-spacer {
            min-height: 60vh;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            padding: 40px 20px;
            text-align: center;
        }

        .sub-title {
            font-size: 0.7rem;
            font-weight: 300;
            letter-spacing: 6px;
            opacity: 0.3;
            margin: 15px 0 45px 0;
            text-transform: uppercase;
        }

        .theme-toggle {
            position: fixed; top: 25px; right: 25px; z-index: 100;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--glass-border);
            padding: 10px 18px; border-radius: 20px;
            cursor: pointer; color: var(--text-color);
            font-size: 0.65rem; backdrop-filter: blur(10px);
        }

        /* 横向名片保持 */
        .profile-card {
            width: 310px; height: 125px;
            background: var(--avatar-box-bg);
            border-radius: 32px; display: flex; flex-direction: row;
            align-items: center; padding: 0 28px; gap: 22px;
            box-shadow: 0 25px 55px rgba(0,0,0,0.6);
        }

        .avatar-circle {
            width: 65px; height: 65px; border-radius: 50%; overflow: hidden;
            flex-shrink: 0; border: 1px solid rgba(0,0,0,0.05);
        }
        .avatar-circle img { width: 100%; height: 100%; object-fit: cover; }
        .card-info { color: #1a1a1c; text-align: left; }
        .card-info .name { font-size: 1.05rem; font-weight: 700; margin: 0; }
        .card-info .role { font-size: 0.55rem; opacity: 0.7; text-transform: uppercase; margin: 2px 0 6px 0; }
        .card-info .social { font-size: 0.5rem; opacity: 0.5; line-height: 1.5; }

        .glass-panel {
            flex-grow: 1; background: var(--panel-bg);
            backdrop-filter: blur(45px); -webkit-backdrop-filter: blur(45px);
            border-radius: 50px 50px 0 0; border: 1px solid var(--glass-border);
            padding: 60px 20px 100px 20px; width: 100%; max-width: 850px;
            margin: 0 auto; display: flex; flex-direction: column; align-items: center;
        }

        #searchInput {
            width: 100%; max-width: 420px; padding: 18px; border-radius: 35px;
            border: 1px solid var(--glass-border); background: rgba(255,255,255,0.06);
            color: var(--text-color); text-align: center; margin-bottom: 45px; outline: none;
        }

        #audio-list { width: 100%; max-width: 620px; }
        .audio-card {
            background: var(--card-bg); border-radius: 25px; padding: 25px; margin-bottom: 20px;
            border: 1px solid var(--glass-border);
        }
        audio { width: 100%; filter: var(--audio-filter) opacity(0.4); height: 35px; }
    </style>
</head>
<body>

    <div class="background-overlay"></div>
    <button class="theme-toggle" onclick="document.body.classList.toggle('light-mode')">🌓 ENERGY MODE</button>

    <div class="hero-spacer">
        <header>
            <h1 class="aurora-title">AURORA</h1>
            <div class="sub-title">局外夏的Subliminal站台</div>
        </header>
        
        <div class="profile-card">
            <div class="avatar-circle">
                <img src="https://i.pinimg.com/736x/f3/9b/01/f39b01a0cb38ea86d3bbad0e419fbdae.jpg" alt="局外夏">
            </div>
            <div class="card-info">
                <p class="name">「局外夏」</p>
                <p class="role">submaker</p>
                <p class="social">bilibili 局外夏<br>YouTube@bulbby-j2m</p>
            </div>
        </div>
    </div>

    <main class="glass-panel">
        <input type="text" id="searchInput" placeholder="探寻深层频率..." oninput="render()">
        <div id="audio-list"></div>
    </main>

    <script>
        const audioData = [
            { title: "[ Wealth ] 888Hz Resonance", desc: "Attract abundance.", url: "#" },
            { title: "[ Healing ] Aurora Mist", desc: "Aura cleansing.", url: "#" }
        ];

        function render() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const list = document.getElementById('audio-list');
            list.innerHTML = '';
            audioData.forEach(item => {
                if (item.title.toLowerCase().includes(term)) {
                    list.innerHTML += `
                        <div class="audio-card">
                            <div class="audio-info"><h3>${item.title}</h3><p>${item.desc}</p></div>
                            <audio controls src="${item.url}"></audio>
                        </div>
                    `;
                }
            });
        }
        render();
    </script>
</body>
</html>
