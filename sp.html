<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SP Bridge | Aurora Manifest</title>
    <style>
        :root {
            --bg-dark: #030407;
            --accent-glow: #ffffff;
            --glass-border: rgba(255, 255, 255, 0.1);
            --fill-color: #ffffff;
        }

        body {
            margin: 0; padding: 0; background: var(--bg-dark);
            color: #fff; font-family: -apple-system, sans-serif;
            min-height: 100vh; display: flex; flex-direction: column;
            overflow-x: hidden;
        }

        .back-nav {
            position: absolute; top: 30px; left: 30px; text-decoration: none;
            color: #fff; font-size: 0.6rem; letter-spacing: 2px; opacity: 0.4;
        }

        /* --- 核心容器布局 --- */
        .container {
            display: flex; flex-direction: row; width: 100%; max-width: 900px;
            margin: auto; padding: 40px; gap: 40px; align-items: center;
        }

        /* --- 左侧：发光剪影区域 --- */
        .silhouette-area {
            flex: 1; position: relative; display: flex; justify-content: center;
            filter: drop-shadow(0 0 20px rgba(255,255,255,0.2));
        }

        .svg-container { width: 280px; height: 500px; }

        /* 人物剪影样式 */
        .base-silhouette { fill: rgba(255,255,255,0.05); stroke: rgba(255,255,255,0.2); stroke-width: 1; }
        .fill-silhouette { fill: var(--fill-color); transition: all 1.5s cubic-bezier(0.4, 0, 0.2, 1); filter: drop-shadow(0 0 15px #fff); }

        /* --- 右侧：记录面板 --- */
        .control-panel {
            flex: 1.2; background: rgba(255,255,255,0.02);
            backdrop-filter: blur(30px); border: 1px solid var(--glass-border);
            border-radius: 40px; padding: 40px; box-sizing: border-box;
        }

        .title { font-weight: 100; letter-spacing: 10px; font-size: 1.2rem; margin-bottom: 30px; opacity: 0.8; }

        .input-group { margin-bottom: 25px; }
        input {
            width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border);
            border-radius: 15px; padding: 12px; color: #fff; outline: none; transition: 0.3s;
        }
        input:focus { border-color: #fff; }

        .btn-add {
            width: 100%; background: #fff; color: #000; border: none; padding: 12px;
            border-radius: 30px; cursor: pointer; font-size: 0.7rem; letter-spacing: 2px;
            margin-top: 10px; transition: 0.3s;
        }

        /* --- 列表项：勾选逻辑 --- */
        .bridge-list { margin-top: 30px; max-height: 250px; overflow-y: auto; }
        .bridge-item {
            display: flex; align-items: center; gap: 15px; margin-bottom: 15px;
            padding: 15px; background: rgba(255,255,255,0.03); border-radius: 15px;
            border: 1px solid var(--glass-border); transition: 0.3s;
        }
        .bridge-item.completed { opacity: 0.5; border-color: rgba(255,255,255,0.4); }

        .checkbox {
            width: 18px; height: 18px; border: 1px solid #fff; border-radius: 50%;
            cursor: pointer; position: relative; flex-shrink: 0;
        }
        .checkbox.checked::after {
            content: ''; position: absolute; width: 10px; height: 10px;
            background: #fff; border-radius: 50%; top: 3px; left: 3px;
        }

        .bridge-text { font-size: 0.85rem; font-weight: 300; letter-spacing: 1px; }

        @media (max-width: 768px) {
            .container { flex-direction: column; padding: 20px; }
            .svg-container { height: 350px; }
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-nav">← STATION</a>

    <div class="container">
        <div class="silhouette-area">
            <svg class="svg-container" viewBox="0 0 200 500">
                <defs>
                    <clipPath id="fillClip">
                        <rect id="clipRect" x="0" y="500" width="200" height="500" />
                    </clipPath>
                </defs>
                <path class="base-silhouette" d="M100,50 c-15,0-25,10-25,25 s10,25,25,25 s25-10,25-25 S115,50,100,50 M75,110 c-20,10-30,30-30,60 v100 c0,15,10,25,20,30 v150 c0,20,10,30,20,30 h30 c10,0,20-10,20-30 v-150 c10-5,20-15,20-30 v-100 c0-30-10-50-30-60 Z" />
                <path class="fill-silhouette" clip-path="url(#fillClip)" d="M100,50 c-15,0-25,10-25,25 s10,25,25,25 s25-10,25-25 S115,50,100,50 M75,110 c-20,10-30,30-30,60 v100 c0,15,10,25,20,30 v150 c0,20,10,30,20,30 h30 c10,0,20-10,20-30 v-150 c10-5,20-15,20-30 v-100 c0-30-10-50-30-60 Z" />
            </svg>
        </div>

        <div class="control-panel">
            <h2 class="title">SP BRIDGE</h2>
            <div class="input-group">
                <input type="text" id="bridgeInput" placeholder="记录显化迹象或桥梁事件...">
                <button class="btn-add" onclick="addBridge()">ADD RECORD</button>
            </div>

            <div class="bridge-list" id="bridgeList">
                </div>
        </div>
    </div>

    <script>
        let totalItems = 0;
        let completedItems = 0;

        function addBridge() {
            const val = document.getElementById('bridgeInput').value;
            if(!val) return;

            const list = document.getElementById('bridgeList');
            const item = document.createElement('div');
            item.className = 'bridge-item';
            item.innerHTML = `
                <div class="checkbox" onclick="toggleComplete(this)"></div>
                <div class="bridge-text">${val}</div>
            `;
            
            list.prepend(item);
            document.getElementById('bridgeInput').value = '';
            
            totalItems++;
            updateProgress();
        }

        function toggleComplete(el) {
            const item = el.parentElement;
            el.classList.toggle('checked');
            item.classList.toggle('completed');
            
            if(el.classList.contains('checked')) {
                completedItems++;
            } else {
                completedItems--;
            }
            updateProgress();
        }

        function updateProgress() {
            const clipRect = document.getElementById('clipRect');
            const progress = totalItems === 0 ? 0 : completedItems / totalItems;
            
            // 计算 y 轴偏移：从 500 (脚底) 升到 0 (头顶)
            const newY = 500 - (progress * 500);
            clipRect.setAttribute('y', newY);

            // 当 100% 完成时增加强光效果
            const fill = document.querySelector('.fill-silhouette');
            if(progress === 1) {
                fill.style.filter = "drop-shadow(0 0 30px #fff)";
            } else {
                fill.style.filter = "drop-shadow(0 0 15px #fff)";
            }
        }
    </script>
</body>
</html>
